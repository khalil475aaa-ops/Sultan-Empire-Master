<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN NEON HUB V57.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #050505; --neon-green: #39ff14; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        .revenue-header { 
            background: #000; border-bottom: 2px solid var(--gold); 
            padding: 10px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); z-index: 100; 
        }

        /* --- 1. PERFECT 3D SPHERE (No Line, No Shrinking) --- */
        .profile-section { display: flex; align-items: center; gap: 15px; }
        .sphere-container {
            width: 70px; height: 70px;
            position: relative;
            perspective: 1000px;
        }
        .sphere-ball {
            width: 100%; height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            animation: rotateFull 12s linear infinite;
        }
        /* تصویر کو گیند کی طرح چاروں طرف لپیٹ دیا گیا ہے */
        .sphere-ball::before, .sphere-ball::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            border-radius: 50%; background: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png');
            background-size: cover; background-position: center;
            border: 3px solid var(--gold); box-shadow: 0 0 20px var(--gold);
        }
        .sphere-ball::after { transform: rotateY(180deg); }

        @keyframes rotateFull {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .amount { color: var(--neon-green); font-size: 28px; font-weight: bold; text-shadow: 0 0 15px var(--neon-green); }

        /* --- 2. GLASS BUTTONS WITH INTERNAL GLOW --- */
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 25px; 
            display: grid; gap: 30px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
        }

        .tile-btn { 
            position: relative; background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px; padding: 20px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 140px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* اندرونی لائٹ (Internal Bulb) */
        .tile-btn::after {
            content: ''; position: absolute; bottom: -10px; width: 70%; height: 30%;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 80%);
            opacity: 0.5; filter: blur(8px);
        }

        .tile-btn:hover { border-color: var(--glow-color); transform: scale(1.05); }
        
        .glow-green { --glow-color: #25d366; }
        .glow-blue { --glow-color: #1877f2; }
        .glow-red { --glow-color: #ff0000; }
        .glow-gold { --glow-color: #ffd700; }

        /* --- 3. OPEN QURAN ON REHAL (Special Design) --- */
        .quran-btn {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://i.postimg.cc/85M2V79f/open-quran-rehal.jpg'); /* کھلا ہوا قرآن */
            background-size: cover; background-position: center;
            border: 4px solid #00ff88 !important;
            --glow-color: #00ff88;
        }
        /* اگر اوپر والا لنک کام نہ کرے تو یہ بیک اپ تصویر ہے جو یسٓ کے ساتھ کھلی ہوئی ہے */
        .quran-btn-fallback {
             background-image: url('https://img.freepik.com/premium-photo/holy-quran-open-with-rehal_1029473-152230.jpg');
        }

        .icon-circle { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; margin-bottom: 12px; }
        .tile-title { font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body onclick="enableAudioEngine()">

<audio id="keypad-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
<audio id="tuut-sound" src="https://www.soundjay.com/buttons/button-37.mp3" preload="auto"></audio>

<div class="revenue-header">
    <div class="profile-section">
        <div class="sphere-container">
            <div class="sphere-ball"></div>
        </div>
        <div style="font-weight:bold; color:var(--gold); font-size: 18px; margin-left: 10px;">SULTAN EMPIRE</div>
    </div>
    <div class="amount" id="income-val">$19.9840</div>
</div>

<div class="dashboard-container">
    <a href="https://quran.com/ur" target="_blank" class="tile-btn quran-btn" onmouseenter="playTuut()" onmousedown="playKeypad()">
        <div class="icon-circle"><i class="fa-solid fa-book-quran" style="color:#00ff88; font-size: 45px; text-shadow: 0 0 20px #00ff88;"></i></div>
        <span class="tile-title">Quran Pak</span>
    </a>

    <a href="https://web.whatsapp.com" target="_blank" class="tile-btn glow-green" onmouseenter="playTuut()" onmousedown="playKeypad()">
        <div class="icon-circle"><i class="fa-brands fa-whatsapp" style="color:#25d366; font-size:40px;"></i></div>
        <span class="tile-title">WhatsApp</span>
    </a>

    <a href="https://www.youtube.com" target="_blank" class="tile-btn glow-red" onmouseenter="playTuut()" onmousedown="playKeypad()">
        <div class="icon-circle"><i class="fa-brands fa-youtube" style="color:#ff0000; font-size:38px;"></i></div>
        <span class="tile-title">YouTube</span>
    </a>

    <a href="https://www.facebook.com" target="_blank" class="tile-btn glow-blue" onmouseenter="playTuut()" onmousedown="playKeypad()">
        <div class="icon-circle"><i class="fa-brands fa-facebook" style="color:#1877f2; font-size:40px;"></i></div>
        <span class="tile-title">Facebook</span>
    </a>

    <a href="https://www.tiktok.com" target="_blank" class="tile-btn glow-gold" onmouseenter="playTuut()" onmousedown="playKeypad()">
        <div class="icon-circle"><i class="fa-brands fa-tiktok" style="color:#fff; font-size:35px;"></i></div>
        <span class="tile-title">TikTok</span>
    </a>

    <a href="https://www.google.com" target="_blank" class="tile-btn glow-blue" onmouseenter="playTuut()" onmousedown="playKeypad()">
        <div class="icon-circle"><i class="fa-brands fa-google" style="color:#4285f4; font-size:35px;"></i></div>
        <span class="tile-title">Google</span>
    </a>
</div>

<script>
    const keypad = document.getElementById('keypad-sound');
    const tuut = document.getElementById('tuut-sound');

    function enableAudioEngine() {
        keypad.play().then(() => keypad.pause());
        tuut.play().then(() => tuut.pause());
    }

    // ٹیوٹ ٹیوٹ آواز (Hover)
    function playTuut() { tuut.currentTime = 0; tuut.play().catch(e => {}); }
    // ٹو ٹو آواز (Click)
    function playKeypad() { keypad.currentTime = 0; keypad.play().catch(e => {}); }

    // انکم ٹریکر
    let income = parseFloat(localStorage.getItem('sultan_income')) || 19.9840; 
    setInterval(() => { 
        income += 0.0004; 
        document.getElementById('income-val').innerText = "$" + income.toFixed(4); 
        localStorage.setItem('sultan_income', income); 
    }, 1000);
</script>

<script src="https://pl28819672.effectivegatecpm.com/10/26/a8/1026a8fd412ba6e1ba7f87f0434b96e2.js"></script>
</body>
</html>
