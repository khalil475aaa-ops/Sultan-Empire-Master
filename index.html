<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN CRYSTAL HUB V65.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #020202; }
        
        /* --- 1. BACKGROUND ANIMATED CRYSTAL LIGHTS --- */
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #0a0a0a 0%, #020202 100%);
            color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* ایل ای ڈی لائٹس کا بیک گراؤنڈ اثر */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 0, 0.1), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 0, 255, 0.1), transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(0, 255, 0, 0.05), transparent 50%);
            animation: ledShift 10s ease infinite alternate;
            z-index: -1;
        }

        @keyframes ledShift {
            0% { filter: hue-rotate(0deg) brightness(1); }
            100% { filter: hue-rotate(360deg) brightness(1.5); }
        }

        .revenue-header { 
            background: rgba(0,0,0,0.9); border-bottom: 3px solid var(--gold); 
            padding: 12px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); z-index: 100; 
        }

        /* --- 2. GLASS BALL WITH STATIC PHOTO --- */
        .glass-ball-frame {
            width: 85px; height: 85px; position: relative;
            border-radius: 50%; overflow: hidden; border: 2px solid var(--gold);
            box-shadow: 0 0 20px var(--gold); background: #000;
        }
        .static-photo {
            position: absolute; width: 100%; height: 100%;
            background: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png') center/cover;
            z-index: 1;
        }
        /* گھومتا ہوا شیشے کا فٹ بال (Right to Left) */
        .rotating-glass-layer {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 40%, rgba(255,255,255,0.4) 100%);
            z-index: 2; animation: glassSpin 3s linear infinite;
        }
        @keyframes glassSpin { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        .amount { color: #39ff14; font-size: 30px; font-weight: bold; text-shadow: 0 0 15px #39ff14; }

        /* --- 3. CRYSTAL BUTTONS & GRID --- */
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 25px; 
            display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
        }

        .tile-btn { 
            position: relative; background: var(--crystal-clr); 
            backdrop-filter: blur(15px); border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px; padding: 20px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 140px; transition: 0.4s; overflow: hidden;
            box-shadow: inset 0 0 25px rgba(255,255,255,0.2), 0 10px 20px rgba(0,0,0,0.5);
        }

        .tile-btn::after {
            content: ''; position: absolute; bottom: -15px; width: 100%; height: 60%;
            background: radial-gradient(circle, white 0%, transparent 75%);
            opacity: 0.4; filter: blur(10px);
        }

        .tile-btn:hover { transform: scale(1.08); border-color: white; box-shadow: 0 0 25px var(--crystal-clr); }

        .clr-q { --crystal-clr: rgba(0, 143, 57, 0.4); }
        .clr-w { --crystal-clr: rgba(37, 211, 102, 0.4); }
        .clr-b { --crystal-clr: rgba(13, 71, 161, 0.4); }
        .clr-r { --crystal-clr: rgba(183, 28, 28, 0.4); }
        .clr-g { --crystal-clr: rgba(255, 143, 0, 0.4); }

        .icon-box { 
            width: 65px; height: 65px; background: #000; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 12px; border: 2px solid rgba(255,255,255,0.2); z-index: 5;
        }

        .quran-btn-bg {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://img.freepik.com/premium-photo/holy-quran-open-with-rehal_1029473-152230.jpg') !important;
            background-size: cover !important;
        }

        .tile-title { font-size: 11px; font-weight: bold; text-transform: uppercase; z-index: 5; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body onclick="startSfx()">

<audio id="tuut-sfx" src="https://www.soundjay.com/buttons/button-37.mp3" preload="auto"></audio>
<audio id="tick-sfx" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

<div class="revenue-header">
    <div class="profile-section">
        <div class="glass-ball-frame">
            <div class="static-photo"></div>
            <div class="rotating-glass-layer"></div>
        </div>
        <div style="font-weight:bold; color:var(--gold); font-size: 18px; margin-left: 10px;">SULTAN EMPIRE</div>
    </div>
    <div class="amount" id="inc-box">$19.9840</div>
</div>

<div class="dashboard-container">
    <a href="https://quran.com/ur" target="_blank" class="tile-btn clr-q quran-btn-bg" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-book-quran" style="color:#00ff88; font-size:35px;"></i></div>
        <span class="tile-title">Quran Pak</span>
    </a>

    <a href="https://web.whatsapp.com" target="_blank" class="tile-btn clr-w" onmouseenter="playTuut()" onmousedown="playTick()">

        <span class="tile-title">WhatsApp</span>

    <a href="https://www.facebook.com" target="_blank" class="tile-btn clr-b" onmouseenter="playTuut()" onmousedown="playTick()">

    <a href="https://www.tiktok.com" target="_blank" class="tile-btn clr-g" onmouseenter="playTuut()" onmousedown="playTick()">

    </a>

    <a href="https://www.google.com" target="_blank" class="tile-btn clr-b" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-google" style="color:#4285f4; font-size:35px;"></i></div>
        <span class="tile-title">Google</span>
    </a>

    <a href="https://www.amazon.com" target="_blank" class="tile-btn clr-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-amazon" style="color:#ff9900; font-size:35px;"></i></div>

    </a>

    <a href="https://www.poki.com" target="_blank" class="tile-btn clr-r" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-gamepad" style="color:#ff3e3e; font-size:38px;"></i></div>
        <span class="tile-title">Poki Games</span>
    </a>

    <a href="https://klingai.com" target="_blank" class="tile-btn clr-b" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-robot" style="color:#00f2ff; font-size:30px;"></i></div>
        <span class="tile-title">Kling AI</span>
    </a>

    <a href="https://runwayml.com" target="_blank" class="tile-btn clr-g" style="--crystal-clr:rgba(255,0,255,0.4);" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-video" style="color:#ff00ff; font-size:30px;"></i></div>
        <span class="tile-title">Runway AI</span>
    </a>

    <a href="https://www.aliexpress.com" target="_blank" class="tile-btn clr-r" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-cart-shopping" style="color:#fff; font-size:30px;"></i></div>
        <span class="tile-title">AliExpress</span>
    </a>

    <a href="https://www.alibaba.com" target="_blank" class="tile-btn clr-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-box" style="color:#fff; font-size:30px;"></i></div>
        <span class="tile-title">Alibaba</span>
    </a>

    <a href="https://www.epicgames.com" target="_blank" class="tile-btn clr-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-gun" style="color:#fff; font-size:30px;"></i></div>
        <span class="tile-title">Epic Games</span>
    </a>

    <a href="https://www.y8.com" target="_blank" class="tile-btn clr-r" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-circle-play" style="color:#fff; font-size:38px;"></i></div>

    </a>

    <a href="https://pika.art" target="_blank" class="tile-btn clr-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-wand-magic-sparkles" style="color:#fff; font-size:30px;"></i></div>
        <span class="tile-title">Pika AI</span>
    </a>

    <a href="https://www.bbc.com" target="_blank" class="tile-btn clr-r" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-newspaper" style="color:#fff; font-size:30px;"></i></div>
        <span class="tile-title">BBC News</span>
    </a>

    <a href="https://www.crazygames.com" target="_blank" class="tile-btn clr-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-headset" style="color:#fff; font-size:35px;"></i></div>
        <span class="tile-title">Crazy Games</span>
    </a>
</div>

<script>
    const tuut = document.getElementById('tuut-sfx');
    const tick = document.getElementById('tick-sfx');
    
    function startSfx() { tuut.play().then(()=>tuut.pause()); tick.play().then(()=>tick.pause()); }
    function playTuut() { tuut.currentTime = 0; tuut.play().catch(()=>{}); }
    function playTick() { tick.currentTime = 0; tick.play().catch(()=>{}); }

    let income = parseFloat(localStorage.getItem('sultan_income')) || 19.9840; 
    setInterval(() => { 
        income += 0.0004; 
        document.getElementById('inc-box').innerText = "$" + income.toFixed(4); 
        localStorage.setItem('sultan_income', income); 
    }, 1000);
</script>

<script src="https://pl28819672.effectivegatecpm.com/10/26/a8/1026a8fd412ba6e1ba7f87f0434b96e2.js"></script>
</body>
</html>
