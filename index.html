<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN HYBRID EMPIRE</title>
    <style>
        :root { --gold: #ffd700; --black: #050505; }
        body { margin: 0; background: var(--black); color: white; font-family: sans-serif; overflow: hidden; }

        /* PC SIDEBAR (Sirf badi screen par dikhega) */
        .sidebar { 
            width: 300px; background: #111; border-right: 3px solid var(--gold); 
            height: 100vh; padding: 20px; overflow-y: auto; display: block;
        }

        /* MOBILE BUTTONS (Sirf mobile par dikhega) */
        .mobile-nav { 
            display: none; background: #111; border-bottom: 2px solid var(--gold); 
            padding: 10px; overflow-x: auto; white-space: nowrap; 
        }

        /* INCOME METER */
        .revenue-box { background: #000; border: 1px solid #39ff14; padding: 10px; text-align: center; margin-bottom: 15px; }
        .amount { color: #39ff14; font-size: 28px; font-weight: bold; }

        .btn { 
            width: 100%; padding: 12px; margin-bottom: 10px; background: #222; 
            border: 1px solid var(--gold); color: white; cursor: pointer; text-align: left;
        }

        .main-content { flex-grow: 1; height: 100vh; background: white; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 🔥 MAGIC: PC vs Mobile Settings */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { display: none; } /* Mobile par sidebar gayab */
            .mobile-nav { display: flex; gap: 10px; } /* Mobile par buttons active */
            .main-content { height: calc(100vh - 120px); }
        }

        @media (min-width: 769px) {
            body { display: flex; }
            .mobile-nav { display: none; } /* PC par mobile buttons gayab */
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="revenue-box">
            <div style="font-size: 10px;">TOTAL REVENUE</div>
            <div class="amount" id="pc-income">$0.6000</div>
        </div>
        <h3 style="color: var(--gold);">SULTAN PC ENGINE</h3>
        <button class="btn" onclick="load('https://quran.com/ur')">📖 ISLAM 360</button>
        <button class="btn" onclick="window.open('https://www.amazon.com', '_blank')">🛒 AMAZON</button>
        <button class="btn" onclick="load('https://www.google.com/search?igu=1')">🔍 GOOGLE</button>
        <button class="btn" onclick="window.open('https://web.whatsapp.com', '_blank')">💬 WHATSAPP</button>
    </div>

    <div class="mobile-nav">
        <div style="padding-right: 15px; border-right: 1px solid #333;">
            <span id="mob-income" style="color: #39ff14; font-weight: bold;">$0.6000</span>
        </div>
        <button onclick="load('https://quran.com/ur')">📖 QURAN</button>
        <button onclick="window.open('https://www.amazon.com', '_blank')">🛒 AMZ</button>
        <button onclick="load('https://www.google.com/search?igu=1')">🔍 GOOGLE</button>
        <button onclick="window.open('https://web.whatsapp.com', '_blank')">💬 WA</button>
    </div>

    <div class="main-content">
        <iframe id="screen" src="https://www.google.com/search?igu=1"></iframe>
    </div>

    <script>
        let income = 0.6000;
        setInterval(() => {
            income += 0.00015;
            let formatted = "$" + income.toFixed(4);
            if(document.getElementById('pc-income')) document.getElementById('pc-income').innerText = formatted;
            if(document.getElementById('mob-income')) document.getElementById('mob-income').innerText = formatted;
        }, 1500);

        function load(url) { document.getElementById('screen').src = url; }
    </script>
</body>
</html>
