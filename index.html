<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN CRYSTAL-TECH V64.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #020202; }
        
        /* --- 3. BACKGROUND ANIMATED LIGHTS (LED Effect) --- */
        body { 
            margin: 0; 
            background: linear-gradient(45deg, #050505, #0a0a0a, #050505);
            background-size: 400% 400%;
            animation: bgShift 15s ease infinite;
            color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .revenue-header { 
            background: rgba(0,0,0,0.9); border-bottom: 3px solid var(--gold); 
            padding: 12px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); z-index: 100; 
        }

        /* --- 1. GLASS BALL WITH STATIC PHOTO --- */
        .profile-section { display: flex; align-items: center; gap: 15px; }
        .glass-ball-frame {
            width: 85px; height: 85px; position: relative;
            border-radius: 50%; overflow: hidden;
            border: 2px solid var(--gold);
            box-shadow: 0 0 20px var(--gold);
        }
        .inner-photo {
            position: absolute; width: 100%; height: 100%;
            background: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png') center/cover;
            z-index: 1;
        }
        /* گھومتا ہوا شیشے کا بال (Right to Left) */
        .glass-sphere-rotate {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            z-index: 2; animation: ballRotate 3s linear infinite;
        }
        @keyframes ballRotate { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .amount { color: #39ff14; font-size: 30px; font-weight: bold; text-shadow: 0 0 15px #39ff14; }

        /* --- 2. CRYSTAL BUTTONS & GRID --- */
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 25px; 
            display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            /* بیک گراؤنڈ میں مکس لائٹیں */
            background: radial-gradient(circle at 20% 30%, rgba(255, 0, 0, 0.05), transparent),
                        radial-gradient(circle at 80% 70%, rgba(0, 0, 255, 0.05), transparent);
        }

        .tile-btn { 
            position: relative; background: var(--btn-color); 
            backdrop-filter: blur(15px); border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px; padding: 20px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 140px; transition: 0.4s; overflow: hidden;
            box-shadow: inset 0 0 25px rgba(255,255,255,0.2), 0 5px 15px rgba(0,0,0,0.5);
        }

        .tile-btn:hover { transform: scale(1.05); border-color: white; box-shadow: 0 0 20px var(--btn-color); }

        .crystal-q { --btn-color: rgba(0, 143, 57, 0.4); }
        .crystal-w { --btn-color: rgba(37, 211, 102, 0.4); }
        .crystal-b { --btn-color: rgba(13, 71, 161, 0.4); }
        .crystal-r { --btn-color: rgba(183, 28, 28, 0.4); }
        .crystal-g { --btn-color: rgba(255, 143, 0, 0.4); }

        .app-circle { 
            width: 65px; height: 65px; background: #000; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 12px; border: 2px solid rgba(255,255,255,0.2);
            z-index: 5;
        }

        .quran-bg {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://img.freepik.com/premium-photo/holy-quran-open-with-rehal_1029473-152230.jpg') !important;
            background-size: cover !important;
        }

        .tile-title { font-size: 11px; font-weight: bold; text-transform: uppercase; z-index: 5; text-shadow: 1px 1px 3px #000; }
    </style>
</head>
<body onclick="enableAudio()">

<audio id="tuut-sfx" src="https://www.soundjay.com/buttons/button-37.mp3" preload="auto"></audio>
<audio id="tick-sfx" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

<div class="revenue-header">
    <div class="profile-section">
        <div class="glass-ball-frame">
            <div class="inner-photo"></div>
            <div class="glass-sphere-rotate"></div>
        </div>
        <div style="font-weight:bold; color:var(--gold); font-size: 18px;">SULTAN EMPIRE</div>
    </div>
    <div class="amount" id="revenue">$19.9840</div>
</div>

<div class="dashboard-container">
    <a href="https://quran.com/ur" target="_blank" class="tile-btn crystal-q quran-bg" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="app-circle"><i class="fa-solid fa-book-quran" style="color:#00ff88; font-size:35px;"></i></div>
        <span class="tile-title">Quran Pak</span>
    </a>

    <a href="https://web.whatsapp.com" target="_blank" class="tile-btn crystal-w" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="app-circle"><i class="fa-brands fa-whatsapp" style="color:#25d366; font-size:40px;"></i></div>
        <span class="tile-title">WhatsApp</span>
    </a>

    <a href="https://www.youtube.com" target="_blank" class="tile-btn crystal-r" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="app-circle"><i class="fa-brands fa-youtube" style="color:#ff0000; font-size:38px;"></i></div>
        <span class="tile-title">YouTube</span>
    </a>

    <a href="https://www.facebook.com" target="_blank" class="tile-btn crystal-b" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="app-circle"><i class="fa-brands fa-facebook" style="color:#1877f2; font-size:40px;"></i></div>
        <span class="tile-title">Facebook</span>
    </a>

    <a href="https://www.tiktok.com" target="_blank" class="tile-btn crystal-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="app-circle"><i class="fa-brands fa-tiktok" style="color:#fff; font-size:35px;"></i></div>
        <span class="tile-title">TikTok</span>
    </a>

    <a href="https://www.google.com" target="_blank" class="tile-btn crystal-b" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="app-circle"><i class="fa-brands fa-google" style="color:#4285f4; font-size:35px;"></i></div>
        <span class="tile-title">Google</span>
    </a>
    
    <a href="https://www.amazon.com" target="_blank" class="tile-btn crystal-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="app-circle"><i class="fa-brands fa-amazon" style="color:#ff9900; font-size:35px;"></i></div>
        <span class="tile-title">Amazon</span>
    </a>
    <a href="https://klingai.com" target="_blank" class="tile-btn crystal-b" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="app-circle"><i class="fa-solid fa-robot" style="color:#00f2ff; font-size:30px;"></i></div>
        <span class="tile-title">Kling AI</span>
    </a>
</div>

<script>
    const tuut = document.getElementById('tuut-sfx');
    const tick = document.getElementById('tick-sfx');
    
    function enableAudio() { tuut.play().then(()=>tuut.pause()); tick.play().then(()=>tick.pause()); }
    function playTuut() { tuut.currentTime = 0; tuut.play().catch(()=>{}); }
    function playTick() { tick.currentTime = 0; tick.play().catch(()=>{}); }

    let income = parseFloat(localStorage.getItem('sultan_income')) || 19.9840; 
    setInterval(() => { 
        income += 0.0004; 
        document.getElementById('revenue').innerText = "$" + income.toFixed(4); 
        localStorage.setItem('sultan_income', income); 
    }, 1000);
</script>

<script src="https://pl28819672.effectivegatecpm.com/10/26/a8/1026a8fd412ba6e1ba7f87f0434b96e2.js"></script>
</body>
</html>
