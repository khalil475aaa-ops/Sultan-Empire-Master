<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #050505; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        .revenue-header { 
            background: #000; border-bottom: 2px solid var(--gold); 
            padding: 10px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); z-index: 100; 
        }
        .profile-section { display: flex; align-items: center; gap: 10px; }
        
        /* --- PERMANENT 3D ROTATION --- */
        .user-avatar-container { perspective: 1000px; pointer-events: none; }
        .user-avatar {
            width: 55px; height: 55px; border-radius: 50%; 
            border: 3px solid var(--gold); background: #111;
            overflow: hidden; box-shadow: 0 0 15px var(--gold);
            display: flex; justify-content: center; align-items: center;
            animation: rotate3D 6s linear infinite;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        @keyframes rotate3D {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .amount { color: #39ff14; font-size: 28px; font-weight: bold; text-shadow: 0 0 10px #39ff14; }
        
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 15px; 
            display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
        }

        .tile-btn { 
            position: relative; 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px; 
            padding: 15px; 
            text-decoration: none; 
            color: #fff;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 120px;
            top: 0; 
            transition: all 0.1s ease;
            box-shadow: 0 6px 0px rgba(0,0,0,0.6); 
        }

        .tile-btn:hover { top: -2px; box-shadow: 0 8px 0px rgba(0,0,0,0.7); filter: brightness(1.2); }
        .tile-btn:active { top: 6px; box-shadow: 0 0px 0px transparent; filter: brightness(2.0) saturate(1.5); transform: translateY(2px); }

        .icon-circle {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid rgba(255, 215, 0, 0.8);
            display: flex; justify-content: center; align-items: center; margin-bottom: 8px;
            background: rgba(0, 0, 0, 0.3);
        }

        .glow-green { box-shadow: 0 12px 25px -5px rgba(37, 211, 102, 0.7), 0 6px 0px rgba(0,0,0,0.6); }
        .glow-blue { box-shadow: 0 12px 25px -5px rgba(24, 119, 242, 0.7), 0 6px 0px rgba(0,0,0,0.6); }
        .glow-red { box-shadow: 0 12px 25px -5px rgba(255, 0, 0, 0.7), 0 6px 0px rgba(0,0,0,0.6); }
        .glow-gold { box-shadow: 0 12px 25px -5px rgba(255, 215, 0, 0.7), 0 6px 0px rgba(0,0,0,0.6); }
        .tile-title { font-size: 11px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>

<script>
    // Sultan's Image Lock Script
    window.onload = function() {
        var savedPic = localStorage.getItem('sultan_profile_pic');
        if (savedPic) {
            document.getElementById('global-pic').src = savedPic;
        }
    };

    function enableAudio() {
        let tone = document.getElementById('keypad-tone');
        tone.play().then(() => { tone.pause(); }).catch(e => {});
    }

    function playTone() {
        let tone = document.getElementById('keypad-tone');
        tone.currentTime = 0;
        tone.play().catch(e => {});
    }

    let income = parseFloat(localStorage.getItem('sultan_income')) || 2.9624; 
    function updateDisplay() {
        document.getElementById('main-income').innerText = "$" + income.toFixed(4);
        localStorage.setItem('sultan_income', income);
    }
    setInterval(() => { income += 0.0004; updateDisplay(); }, 1000);
    updateDisplay();
</script>
