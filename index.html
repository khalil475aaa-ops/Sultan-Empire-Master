<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN NEON HUB V54.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #050505; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        .revenue-header { 
            background: #000; border-bottom: 2px solid var(--gold); 
            padding: 10px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); z-index: 100; 
        }

        /* --- SULTAN'S 3D COIN (Double Sided) --- */
        .profile-section { display: flex; align-items: center; gap: 12px; }
        .coin-container {
            width: 65px; height: 65px;
            perspective: 1000px;
        }
        .coin {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: flipCoin 6s linear infinite;
        }
        .coin-face {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 3px solid var(--gold);
            backface-visibility: hidden;
            background-image: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png');
            background-size: cover; background-position: center;
            box-shadow: 0 0 15px var(--gold);
        }
        .coin-back { transform: rotateY(180deg); }

        @keyframes flipCoin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .amount { color: #39ff14; font-size: 28px; font-weight: bold; text-shadow: 0 0 15px #39ff14; }

        /* --- GLASS BUTTONS WITH UNDER-GLOW --- */
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 20px; 
            display: grid; gap: 25px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
        }

        .tile-btn { 
            position: relative; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; 
            padding: 15px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 130px; transition: all 0.2s ease;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.1); /* Inside Glow */
        }

        /* Under-glow lighting (Inside and Outside) */
        .glow-green { box-shadow: 0 10px 20px -5px rgba(37, 211, 102, 0.5), inset 0 0 10px rgba(37, 211, 102, 0.3); border-color: #25d366; }
        .glow-blue { box-shadow: 0 10px 20px -5px rgba(24, 119, 242, 0.5), inset 0 0 10px rgba(24, 119, 242, 0.3); border-color: #1877f2; }
        .glow-red { box-shadow: 0 10px 20px -5px rgba(255, 0, 0, 0.5), inset 0 0 10px rgba(255, 0, 0, 0.3); border-color: #ff0000; }
        .glow-gold { box-shadow: 0 10px 20px -5px rgba(255, 215, 0, 0.5), inset 0 0 10px rgba(255, 215, 0, 0.3); border-color: var(--gold); }

        .tile-btn:active { transform: scale(0.95); filter: brightness(1.5); }

        /* --- SPECIAL QURAN BUTTON --- */
        .quran-btn {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://img.freepik.com/premium-photo/holy-quran-with-arabic-calligraphy-meaning-al-yasin_839035-17792.jpg');
            background-size: cover; background-position: center;
            border: 3px solid #00ff88 !important;
        }
        .quran-btn i { font-size: 45px !important; text-shadow: 0 0 20px #00ff88; }

        .icon-circle { 
            width: 55px; height: 55px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; margin-bottom: 10px;
        }
        .tile-title { font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body onclick="setupAudio()">

<audio id="click-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
<audio id="hover-sound" src="https://www.soundjay.com/buttons/button-37.mp3" preload="auto"></audio>

<div class="revenue-header">
    <div class="profile-section">
        <div class="coin-container">
            <div class="coin">
                <div class="coin-face front"></div>
                <div class="coin-face coin-back"></div>
            </div>
        </div>
        <div style="font-weight:bold; color:var(--gold); font-size: 16px;">SULTAN EMPIRE</div>
    </div>
    <div class="amount" id="main-income">$19.9840</div>
</div>

<div class="dashboard-container">
    <a href="https://quran.com/ur" target="_blank" class="tile-btn glow-green quran-btn" onmouseenter="playHover()" onmousedown="playClick()">
        <div class="icon-circle"><i class="fa-solid fa-book-quran" style="color:#00ff88;"></i></div>
        <span class="tile-title">Quran Pak</span>
    </a>

    <a href="https://www.google.com" target="_blank" class="tile-btn glow-blue" onmouseenter="playHover()" onmousedown="playClick()">
        <div class="icon-circle"><i class="fa-brands fa-google" style="color:#4285f4; font-size:30px;"></i></div>
        <span class="tile-title">Google</span>
    </a>
    <a href="https://web.whatsapp.com" target="_blank" class="tile-btn glow-green" onmouseenter="playHover()" onmousedown="playClick()">
        <div class="icon-circle"><i class="fa-brands fa-whatsapp" style="color:#25d366; font-size:35px;"></i></div>
        <span class="tile-title">WhatsApp</span>
    </a>
    <a href="https://www.facebook.com" target="_blank" class="tile-btn glow-blue" onmouseenter="playHover()" onmousedown="playClick()">
        <div class="icon-circle"><i class="fa-brands fa-facebook" style="color:#1877f2; font-size:35px;"></i></div>
        <span class="tile-title">Facebook</span>
    </a>
    <a href="https://www.youtube.com" target="_blank" class="tile-btn glow-red" onmouseenter="playHover()" onmousedown="playClick()">
        <div class="icon-circle"><i class="fa-brands fa-youtube" style="color:#ff0000; font-size:32px;"></i></div>
        <span class="tile-title">YouTube</span>
    </a>
    <a href="https://www.tiktok.com" target="_blank" class="tile-btn glow-gold" onmouseenter="playHover()" onmousedown="playClick()">
        <div class="icon-circle"><i class="fa-brands fa-tiktok" style="color:#fff; font-size:32px;"></i></div>
        <span class="tile-title">TikTok</span>
    </a>
    <a href="https://www.amazon.com" target="_blank" class="tile-btn glow-gold" onmouseenter="playHover()" onmousedown="playClick()">
        <div class="icon-circle"><i class="fa-brands fa-amazon" style="color:#ff9900; font-size:30px;"></i></div>
        <span class="tile-title">Amazon</span>
    </a>
    <a href="https://www.alibaba.com" target="_blank" class="tile-btn glow-red" onmouseenter="playHover()" onmousedown="playClick()">
        <div class="icon-circle"><i class="fa-solid fa-box" style="color:#ff6a00; font-size:28px;"></i></div>
        <span class="tile-title">Alibaba</span>
    </a>
    <a href="https://www.aliexpress.com" target="_blank" class="tile-btn glow-red" onmouseenter="playHover()" onmousedown="playClick()">
        <div class="icon-circle"><i class="fa-solid fa-cart-shopping" style="color:#e62e04; font-size:28px;"></i></div>
        <span class="tile-title">AliExpress</span>
    </a>
    <a href="https://www.poki.com" target="_blank" class="tile-btn glow-red" onmouseenter="playHover()" onmousedown="playClick()">
        <div class="icon-circle"><i class="fa-solid fa-gamepad" style="color:#ff3e3e; font-size:30px;"></i></div>
        <span class="tile-title">Poki Games</span>
    </a>
    <a href="https://runwayml.com" target="_blank" class="tile-btn glow-gold" onmouseenter="playHover()" onmousedown="playClick()">
        <div class="icon-circle"><i class="fa-solid fa-video" style="color:#ff00ff; font-size:28px;"></i></div>
        <span class="tile-title">Runway AI</span>
    </a>
    <a href="https://klingai.com" target="_blank" class="tile-btn glow-blue" onmouseenter="playHover()" onmousedown="playClick()">
        <div class="icon-circle"><i class="fa-solid fa-robot" style="color:#00f2ff; font-size:28px;"></i></div>
        <span class="tile-title">Kling AI</span>
    </a>
    <a href="https://www.bbc.com" target="_blank" class="tile-btn glow-red" onmouseenter="playHover()" onmousedown="playClick()">
        <div class="icon-circle"><i class="fa-solid fa-newspaper" style="color:#bb1919; font-size:28px;"></i></div>
        <span class="tile-title">BBC News</span>
    </a>
</div>

<script>
    let clickSound = document.getElementById('click-sound');
    let hoverSound = document.getElementById('hover-sound');

    function setupAudio() {
        clickSound.play().then(() => { clickSound.pause(); });
        hoverSound.play().then(() => { hoverSound.pause(); });
    }

    function playClick() { clickSound.currentTime = 0; clickSound.play(); }
    function playHover() { hoverSound.currentTime = 0; hoverSound.play(); }

    let income = parseFloat(localStorage.getItem('sultan_income')) || 19.9840; 
    setInterval(() => { 
        income += 0.0004; 
        document.getElementById('main-income').innerText = "$" + income.toFixed(4); 
        localStorage.setItem('sultan_income', income); 
    }, 1000);
</script>

<script src="https://pl28819672.effectivegatecpm.com/10/26/a8/1026a8fd412ba6e1ba7f87f0434b96e2.js"></script>
</body>
</html>
