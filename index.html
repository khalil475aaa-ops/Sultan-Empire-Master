<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN CRYSTAL HUB V62.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #050505; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        .revenue-header { 
            background: #000; border-bottom: 3px solid var(--gold); 
            padding: 10px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 0 25px rgba(255, 215, 0, 0.5); z-index: 100; 
        }

        /* --- 1. TRUE 3D SPHERE (Football Style) --- */
        .profile-section { display: flex; align-items: center; gap: 15px; }
        .football-container { width: 80px; height: 80px; perspective: 1000px; }
        .sphere {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; animation: rotateBall 10s linear infinite;
        }
        /* گیند کے چاروں طرف چہرہ لپیٹنے کے لیے لیئرز */
        .side {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px solid var(--gold);
            background: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png') center/cover;
            box-shadow: inset 0 0 20px #000, 0 0 15px var(--gold);
        }
        .s1 { transform: rotateY(0deg) translateZ(1px); }
        .s2 { transform: rotateY(90deg) translateZ(1px); }
        .s3 { transform: rotateY(180deg) translateZ(1px); }
        .s4 { transform: rotateY(270deg) translateZ(1px); }

        @keyframes rotateBall { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        .amount { color: #39ff14; font-size: 30px; font-weight: bold; text-shadow: 0 0 15px #39ff14; }

        /* --- 2. CRYSTAL DIAMOND BUTTONS --- */
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 20px; 
            display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); 
        }

        .tile-btn { 
            position: relative; background: var(--crystal-color); 
            backdrop-filter: blur(15px); border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px; padding: 15px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 135px; transition: 0.3s; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.2), 0 10px 20px rgba(0,0,0,0.5);
        }

        /* نیچے سے بلب کی روشنی */
        .tile-btn::after {
            content: ''; position: absolute; bottom: -10px; width: 100%; height: 50%;
            background: radial-gradient(circle, white 0%, transparent 70%);
            opacity: 0.4; filter: blur(10px);
        }

        .glow-quran { --crystal-color: rgba(0, 255, 136, 0.3); }
        .glow-whatsapp { --crystal-color: rgba(37, 211, 102, 0.3); }
        .glow-blue { --crystal-color: rgba(24, 119, 242, 0.3); }
        .glow-red { --crystal-color: rgba(255, 0, 0, 0.3); }
        .glow-gold { --crystal-color: rgba(255, 215, 0, 0.3); }

        /* ایپس کے لیے کالا گول دائرہ */
        .icon-bg { 
            width: 65px; height: 65px; background: #000; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 10px; border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        /* --- 3. OPEN QURAN IMAGE --- */
        .quran-img-bg {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://img.freepik.com/premium-photo/holy-quran-open-with-rehal_1029473-152230.jpg') !important;
            background-size: cover !important; border: 3px solid #00ff88 !important;
        }

        .tile-title { font-size: 11px; font-weight: bold; text-transform: uppercase; text-shadow: 1px 1px 3px #000; }
    </style>
</head>
<body onclick="initAudio()">

<audio id="tuut-sfx" src="https://www.soundjay.com/buttons/button-37.mp3" preload="auto"></audio>

<div class="revenue-header">
    <div class="profile-section">
        <div class="football-container">
            <div class="sphere">
                <div class="side s1"></div>
                <div class="side s2"></div>
                <div class="side s3"></div>
                <div class="side s4"></div>
            </div>
        </div>
        <div style="font-weight:bold; color:var(--gold); font-size: 18px; margin-left: 10px;">SULTAN EMPIRE</div>
    </div>
    <div class="amount" id="rev-val">$19.9840</div>
</div>

<div class="dashboard-container">
    <a href="https://quran.com/ur" target="_blank" class="tile-btn glow-quran quran-img-bg" onmouseenter="playTuut()" onmousedown="playTuut()">
        <div class="icon-bg"><i class="fa-solid fa-book-quran" style="color:#00ff88; font-size:35px;"></i></div>
        <span class="tile-title">Quran Pak</span>
    </a>

    <a href="https://web.whatsapp.com" target="_blank" class="tile-btn glow-whatsapp" onmouseenter="playTuut()" onmousedown="playTuut()">
        <div class="icon-bg"><i class="fa-brands fa-whatsapp" style="color:#25d366; font-size:40px;"></i></div>
        <span class="tile-title">WhatsApp</span>
    </a>

    <a href="https://www.facebook.com" target="_blank" class="tile-btn glow-blue" onmouseenter="playTuut()" onmousedown="playTuut()">
        <div class="icon-bg"><i class="fa-brands fa-facebook" style="color:#1877f2; font-size:40px;"></i></div>
        <span class="tile-title">Facebook</span>
    </a>

    <a href="https://www.youtube.com" target="_blank" class="tile-btn glow-red" onmouseenter="playTuut()" onmousedown="playTuut()">
        <div class="icon-bg"><i class="fa-brands fa-youtube" style="color:#ff0000; font-size:38px;"></i></div>
        <span class="tile-title">YouTube</span>
    </a>

    <a href="https://www.google.com" target="_blank" class="tile-btn glow-blue" onmouseenter="playTuut()" onmousedown="playTuut()">
        <div class="icon-bg"><i class="fa-brands fa-google" style="color:#4285f4; font-size:35px;"></i></div>
        <span class="tile-title">Google</span>
    </a>

    <a href="https://www.tiktok.com" target="_blank" class="tile-btn glow-gold" onmouseenter="playTuut()" onmousedown="playTuut()">
        <div class="icon-bg"><i class="fa-brands fa-tiktok" style="color:#fff; font-size:35px;"></i></div>
        <span class="tile-title">TikTok</span>
    </a>

    <a href="https://www.amazon.com" target="_blank" class="tile-btn glow-gold" onmouseenter="playTuut()" onmousedown="playTuut()">
        <div class="icon-bg"><i class="fa-brands fa-amazon" style="color:#ff9900; font-size:35px;"></i></div>
        <span class="tile-title">Amazon</span>
    </a>
    <a href="https://www.poki.com" target="_blank" class="tile-btn glow-red" onmouseenter="playTuut()" onmousedown="playTuut()">
        <div class="icon-bg"><i class="fa-solid fa-gamepad" style="color:#ff3e3e; font-size:35px;"></i></div>
        <span class="tile-title">Poki Games</span>
    </a>
    <a href="https://klingai.com" target="_blank" class="tile-btn glow-blue" onmouseenter="playTuut()" onmousedown="playTuut()">
        <div class="icon-bg"><i class="fa-solid fa-robot" style="color:#00f2ff; font-size:30px;"></i></div>
        <span class="tile-title">Kling AI</span>
    </a>
    <a href="https://runwayml.com" target="_blank" class="tile-btn glow-gold" onmouseenter="playTuut()" onmousedown="playTuut()">
        <div class="icon-bg"><i class="fa-solid fa-video" style="color:#ff00ff; font-size:30px;"></i></div>
        <span class="tile-title">Runway AI</span>
    </a>
    <a href="https://www.bbc.com" target="_blank" class="tile-btn glow-red" onmouseenter="playTuut()" onmousedown="playTuut()">
        <div class="icon-bg"><i class="fa-solid fa-newspaper" style="color:#bb1919; font-size:30px;"></i></div>
        <span class="tile-title">BBC News</span>
    </a>
    </div>

<script>
    const tuut = document.getElementById('tuut-sfx');
    function initAudio() { tuut.play().then(()=>tuut.pause()); }
    function playTuut() { tuut.currentTime = 0; tuut.play().catch(()=>{}); }

    let income = parseFloat(localStorage.getItem('sultan_income')) || 19.9840; 
    setInterval(() => { 
        income += 0.0004; 
        document.getElementById('rev-val').innerText = "$" + income.toFixed(4); 
        localStorage.setItem('sultan_income', income); 
    }, 1000);
</script>

<script src="https://pl28819672.effectivegatecpm.com/10/26/a8/1026a8fd412ba6e1ba7f87f0434b96e2.js"></script>
</body>
</html>
