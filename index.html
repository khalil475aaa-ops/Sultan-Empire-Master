<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN DIAMOND HUB V63.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #020202; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        .revenue-header { 
            background: #000; border-bottom: 3px solid var(--gold); 
            padding: 12px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); z-index: 100; 
        }

        /* --- 1. GLASS SPHERE WITH STATIC IMAGE --- */
        .profile-section { display: flex; align-items: center; gap: 15px; }
        .glass-sphere-container {
            width: 85px; height: 85px; position: relative;
            border-radius: 50%; overflow: hidden;
            border: 2px solid var(--gold);
            box-shadow: 0 0 20px var(--gold);
        }
        /* آپ کی تصویر جو اندر کھڑی ہے */
        .static-photo {
            position: absolute; width: 100%; height: 100%;
            background: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png') center/cover;
            z-index: 1;
        }
        /* گھومتا ہوا شیشے کا فٹ بال اور چمک */
        .glass-overlay {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%, rgba(255,255,255,0.4) 100%);
            z-index: 2; animation: rotateGlass 4s linear infinite;
        }
        .diamond-glint {
            position: absolute; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,215,0,0.3), transparent 20%);
            z-index: 3; animation: rotateGlass 3s linear infinite;
        }

        @keyframes rotateGlass { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .amount { color: #39ff14; font-size: 30px; font-weight: bold; text-shadow: 0 0 15px #39ff14; }

        /* --- 2. CRYSTAL COLORED BUTTONS --- */
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 25px; 
            display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
        }

        .tile-btn { 
            position: relative; background: var(--btn-color); 
            backdrop-filter: blur(10px); border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 25px; padding: 20px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 140px; transition: 0.4s; overflow: hidden;
            box-shadow: inset 0 0 25px rgba(255,255,255,0.3), 0 10px 20px rgba(0,0,0,0.5);
        }

        /* نیچے سے جلتا ہوا بلب */
        .tile-btn::after {
            content: ''; position: absolute; bottom: -15px; width: 100%; height: 60%;
            background: radial-gradient(circle, white 0%, transparent 75%);
            opacity: 0.5; filter: blur(10px);
        }

        .tile-btn:hover { transform: scale(1.08) translateY(-5px); border-color: white; }
        
        /* کلر سکیم */
        .crystal-green { --btn-color: #008f39; }
        .crystal-quran { --btn-color: #1b5e20; }
        .crystal-blue { --btn-color: #0d47a1; }
        .crystal-red { --btn-color: #b71c1c; }
        .crystal-gold { --btn-color: #ff8f00; }
        .crystal-purple { --btn-color: #4a148c; }

        /* ایپس کے لیے کالا گول دائرہ */
        .app-circle { 
            width: 70px; height: 70px; background: #000; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 12px; border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 15px rgba(0,0,0,0.8); z-index: 5;
        }

        /* قرآن بٹن کی تصویر */
        .quran-bg {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://img.freepik.com/premium-photo/holy-quran-open-with-rehal_1029473-152230.jpg') !important;
            background-size: cover !important;
        }

        .tile-title { font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; z-index: 5; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body onclick="initAudio()">

<script>
    const tuut = document.getElementById('tuut-sound');
    function initAudio() { tuut.play().then(()=>tuut.pause()); }
    function playTuut() { tuut.currentTime = 0; tuut.play().catch(()=>{}); }

    let income = parseFloat(localStorage.getItem('sultan_income')) || 19.9840; 
    setInterval(() => { 
        income += 0.0004; 
        document.getElementById('income-meter').innerText = "$" + income.toFixed(4); 
        localStorage.setItem('sultan_income', income); 
    }, 1000);
</script>
