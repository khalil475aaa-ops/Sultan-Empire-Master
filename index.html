<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN NEON HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --neon-green: #39ff14; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .header { background: #000; border-bottom: 2px solid var(--gold); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .amount { color: var(--neon-green); font-size: clamp(24px, 5vw, 35px); font-weight: bold; text-shadow: 0 0 15px var(--neon-green); }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 25px; justify-items: center; }
        .btn { background: #141414; border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; width: 140px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: white; transition: 0.3s; position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn:hover { transform: translateY(-8px); border-color: var(--gold); box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        .icon-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 25px; color: var(--gold); }
        .btn span { font-size: 12px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; text-align: center; }
        /* Har button ka alag glow rang */
        .btn:nth-child(1) { border-color: #2ecc71; } .btn:nth-child(2) { border-color: #3498db; }
        .btn:nth-child(3) { border-color: #25d366; } .btn:nth-child(4) { border-color: #1877f2; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold; color:var(--gold); font-size: 14px;">SULTAN NEON HUB</div>
        <div class="amount" id="money">$2.9624</div>
    </div>

    <div class="container">
        <a href="https://quran.com" class="btn"><div class="icon-circle"><i class="fa-solid fa-book-quran"></i></div><span>QURAN PAK</span></a>
        <a href="https://google.com" class="btn"><div class="icon-circle"><i class="fa-brands fa-google"></i></div><span>GOOGLE</span></a>
        <a href="https://whatsapp.com" class="btn"><div class="icon-circle"><i class="fa-brands fa-whatsapp"></i></div><span>WHATSAPP</span></a>
        <a href="https://facebook.com" class="btn"><div class="icon-circle"><i class="fa-brands fa-facebook-f"></i></div><span>FACEBOOK</span></a>
        <a href="https://youtube.com" class="btn"><div class="icon-circle"><i class="fa-brands fa-youtube"></i></div><span>YOUTUBE</span></a>
        <a href="https://tiktok.com" class="btn"><div class="icon-circle"><i class="fa-brands fa-tiktok"></i></div><span>TIKTOK</span></a>
        <a href="https://amazon.com" class="btn"><div class="icon-circle"><i class="fa-brands fa-amazon"></i></div><span>AMAZON</span></a>
        <a href="https://alibaba.com" class="btn"><div class="icon-circle"><i class="fa-solid fa-box"></i></div><span>ALIBABA</span></a>
        <a href="https://aliexpress.com" class="btn"><div class="icon-circle"><i class="fa-solid fa-cart-shopping"></i></div><span>ALIEXPRESS</span></a>
        <a href="https://poki.com" class="btn"><div class="icon-circle"><i class="fa-solid fa-gamepad"></i></div><span>POKI GAMES</span></a>
        <a href="https://crazygames.com" class="btn"><div class="icon-circle"><i class="fa-solid fa-headset"></i></div><span>CRAZY GAMES</span></a>
        <a href="https://runwayml.com" class="btn"><div class="icon-circle"><i class="fa-solid fa-video"></i></div><span>RUNWAY AI</span></a>
        <a href="https://klingai.com" class="btn"><div class="icon-circle"><i class="fa-solid fa-robot"></i></div><span>KLING AI</span></a>
        <a href="https://epicgames.com" class="btn"><div class="icon-circle"><i class="fa-solid fa-gun"></i></div><span>EPIC GAMES</span></a>
        <a href="https://y8.com" class="btn"><div class="icon-circle"><i class="fa-solid fa-play"></i></div><span>Y8 GAMES</span></a>
        <a href="https://pika.art" class="btn"><div class="icon-circle"><i class="fa-solid fa-wand-magic-sparkles"></i></div><span>PIKA AI</span></a>
        <a href="https://bbc.com/news" class="btn"><div class="icon-circle"><i class="fa-solid fa-newspaper"></i></div><span>BBC NEWS</span></a>
    </div>

    <script>
        // Dollar update hone wala logic
        let income = parseFloat(localStorage.getItem('sultan_income')) || 2.9624;
        
        function updateDisplay() {
            document.getElementById('money').innerText = "$" + income.toFixed(4);
            localStorage.setItem('sultan_income', income);
        }

        setInterval(() => {
            income += 0.0004; // Speed aap yahan se badha sakte hain
            updateDisplay();
        }, 3000);
        
        updateDisplay();
    </script>

    <script src="https://pl28819672.effectivegatecpm.com/10/26/a8/1026a8fd412ba6e1ba7f87f0434b96e2.js"></script>

</body>
</html>
