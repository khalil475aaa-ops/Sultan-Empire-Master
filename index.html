<!DOCTYPE html>
<html lang="ur">
<head>

    <style>
        :root { --gold: #ffd700; --royal: #050505; --neon-green: #39ff14; --neon-blue: #00f3ff; }
        body { background: var(--royal); color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; }
        
        #main-container { display: flex; height: 100vh; }
        
        /* Sidebar: Scrollable for unlimited buttons */
        .sidebar { width: 320px; background: #111; border-right: 4px solid var(--gold); padding: 15px; overflow-y: scroll; scrollbar-width: thin; }
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--gold); }

        .content-area { flex-grow: 1; background: #000; position: relative; }

        /* Live Revenue Dashboard */
        .revenue-monitor { background: #000; border: 2px solid var(--neon-green); border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); text-align: center; }
        .live-amount { font-size: 28px; color: var(--neon-green); font-weight: bold; text-shadow: 0 0 10px var(--neon-green); }

        /* Imperial Buttons */
        .btn { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1.5px solid var(--gold); 
               background: rgba(255, 215, 0, 0.05); color: white; font-weight: bold; cursor: pointer !important; 
               text-align: left; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 13px; }
        .btn:hover { background: var(--gold); color: black; transform: translateX(5px); box-shadow: 0 0 15px var(--gold); }
        
        /* YouTube Floating Master */
        #yt-master { position: fixed; bottom: 20px; right: 20px; width: 300px; height: 180px; border: 3px solid red; border-radius: 15px; z-index: 1000; overflow: hidden; transition: 0.5s; }
        #yt-master.expand { width: 85%; height: 85%; right: 7%; bottom: 7%; }
    </style>
</head>
<body>

<div id="main-container">

        <button class="btn" style="border-color: var(--neon-blue);" onclick="load('https://www.midjourney.com')">🖼️ AALU IMAGE GEN</button>

        <div style="height: 100px;"></div> </div>

    </div>
</div>

<div id="yt-master">
    <button onclick="toggleYT()" style="position:absolute; top:5px; left:5px; z-index:1001; background:red; color:white; border:none; cursor:pointer;">RESIZE</button>
    <iframe id="yt-player" src="https://www.youtube.com/embed?listType=user_uploads&list=YOUR_CHANNEL_ID"></iframe>

<script>
    let currentIncome = 0.0000;

    setInterval(() => {

    function load(url) {

    }

    function openAffiliate(url) {
        // Direct Amazon/Alibaba Link with Sultan's Secret Tracking
        window.open(url + '?tag=sultan-empire-20', '_blank');
        currentIncome += 0.05; // Click bonus
    }

    function toggleYT() {
        document.getElementById('yt-master').classList.toggle('expand');
    }
</script>
</body>
</html>
