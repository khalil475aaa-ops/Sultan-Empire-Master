<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN SPEED HUB V68.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --deep-blue: #000b29; }
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #001a4d 0%, #000511 100%);
            color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }

        .revenue-header { 
            background: rgba(0,0,0,0.9); border-bottom: 3px solid var(--gold); 
            padding: 12px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 5px 25px rgba(0, 11, 41, 0.8); z-index: 100; 
        }

        .glass-ball-frame {
            width: 85px; height: 85px; position: relative;
            border-radius: 50%; overflow: hidden; border: 2px solid var(--gold);
            box-shadow: 0 0 20px var(--gold); background: #000;
            perspective: 1000px;
        }
        
        .character-spin {
            position: absolute; width: 100%; height: 100%;
            background: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png') center/cover;
            border-radius: 50%;
            z-index: 1;
            animation: gameRotate 6s linear infinite;
            transform-style: preserve-3d;
            will-change: transform;
        }

        @keyframes gameRotate { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        .glass-overlay {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%, rgba(255,255,255,0.3) 100%);
            z-index: 2; pointer-events: none;
        }

        .amount { color: #39ff14; font-size: 30px; font-weight: bold; text-shadow: 0 0 15px #39ff14; }

        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 25px; 
            display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            background: rgba(0, 11, 41, 0.3); backdrop-filter: blur(5px);
        }

        .tile-btn { 
            position: relative; background: var(--crystal-clr); 
            border: 4px solid transparent; border-radius: 25px; 
            padding: 20px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 140px; transition: 0.3s ease; overflow: hidden;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }
        
        /* رینبو بارڈر حرکت */
        .tile-btn::before {
            content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 25px;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
            background-size: 400%;
            z-index: -1;
            animation: rainbowBorder 8s linear infinite;
        }
        
        .tile-btn::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--crystal-clr); border-radius: 21px; z-index: -1;
        }

        @keyframes rainbowBorder { 0% { background-position: 0%; } 100% { background-position: 400%; } }

        /* قرآن پاک بٹن کے لیے سپیشل کلاس */
        .quran-btn-fixed {
            background-image: url('https://i.postimg.cc/k47v9Hk2/Quran-Alif-19.jpg') !important;
            background-size: cover !important;
            background-position: center !important;
            border: none !important;
        }

        .quran-btn-fixed::after {
            background: rgba(0, 0, 0, 0.2) !important; /* تصویر کو واضح رکھنے کے لیے ہلکا سایہ */
        }

        .clr-w { --crystal-clr: rgba(37, 211, 102, 0.5); }
        .clr-b { --crystal-clr: rgba(13, 71, 161, 0.5); }
        .clr-r { --crystal-clr: rgba(183, 28, 28, 0.5); }
        .clr-g { --crystal-clr: rgba(255, 143, 0, 0.5); }

        .icon-box { 
            width: 60px; height: 60px; background: rgba(0,0,0,0.6); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.3); z-index: 5;
        }

        .tile-title { font-size: 12px; font-weight: bold; text-transform: uppercase; z-index: 5; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body onmouseover="forceAudioInit()">

<audio id="tuut-sfx" src="https://www.soundjay.com/buttons/button-37.mp3" preload="auto"></audio>
<audio id="tick-sfx" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

<div class="revenue-header">
    <div class="profile-section" style="display:flex; align-items:center;">
        <div class="glass-ball-frame">
            <div class="character-spin"></div>
            <div class="glass-overlay"></div>
        </div>
        <div style="font-weight:bold; color:var(--gold); font-size: 18px; margin-left: 10px;">SULTAN EMPIRE</div>
    </div>
    <div class="amount" id="rev-display">$19.9840</div>
</div>

<div class="dashboard-container">
    <a href="https://quran.com/ur" target="_blank" class="tile-btn quran-btn-fixed" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-book-quran" style="color:#00ff88; font-size:30px;"></i></div>
        <span class="tile-title">Quran Pak</span>
    </a>

    <a href="https://web.whatsapp.com" target="_blank" class="tile-btn clr-w" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-whatsapp" style="color:#25d366; font-size:35px;"></i></div>
        <span class="tile-title">WhatsApp</span>
    </a>

    <a href="https://www.facebook.com" target="_blank" class="tile-btn clr-b" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-facebook" style="color:#1877f2; font-size:35px;"></i></div>
        <span class="tile-title">Facebook</span>
    </a>

    <a href="https://www.youtube.com" target="_blank" class="tile-btn clr-r" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-youtube" style="color:#ff0000; font-size:35px;"></i></div>
        <span class="tile-title">YouTube</span>
    </a>

    <a href="https://www.tiktok.com" target="_blank" class="tile-btn clr-g" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-tiktok" style="color:#fff; font-size:30px;"></i></div>
        <span class="tile-title">TikTok</span>
    </a>

    <a href="https://www.poki.com" target="_blank" class="tile-btn clr-r" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-gamepad" style="color:#ff3e3e; font-size:35px;"></i></div>
        <span class="tile-title">Poki Games</span>
    </a>
</div>

<script>
    const tuut = document.getElementById('tuut-sfx');
    const tick = document.getElementById('tick-sfx');
    let audioInitialized = false;

    function forceAudioInit() {
        if (!audioInitialized) {
            tuut.play().then(() => { tuut.pause(); tuut.currentTime = 0; });
            tick.play().then(() => { tick.pause(); tick.currentTime = 0; });
            audioInitialized = true;
        }
    }

    function playTuut() { 
        if (audioInitialized) {
            tuut.pause(); tuut.currentTime = 0;
            tuut.play().catch(e => {});
        }
    }

    function playTick() { 
        tick.pause(); tick.currentTime = 0;
        tick.play().catch(e => {});
    }

    let income = parseFloat(localStorage.getItem('sultan_income')) || 19.9840; 
    setInterval(() => { 
        income += 0.0004; 
        document.getElementById('rev-display').innerText = "$" + income.toFixed(4); 
        localStorage.setItem('sultan_income', income); 
    }, 1000);
</script>

</body>
</html>
