<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN SPEED HUB V68.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; }
        body { 
            margin: 0; background: #000511; color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }

        .revenue-header { 
            background: #000; border-bottom: 3px solid var(--gold); 
            padding: 12px 20px; display: flex; justify-content: space-between; 
            align-items: center; z-index: 100; 
        }

        .amount { color: #39ff14; font-size: 28px; font-weight: bold; }

        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 25px; 
            display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
        }

        /* مین بٹن ڈیزائن */
        .tile-btn { 
            position: relative; border-radius: 20px; 
            padding: 15px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 150px; overflow: hidden; z-index: 1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* رینبو اینیمیشن بارڈر */
        .tile-btn::before {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 400%; z-index: -2;
            animation: move 10s linear infinite;
        }

        @keyframes move { 0% { background-position: 0%; } 100% { background-position: 400%; } }

        /* قرآن پاک بٹن کے لیے سپیشل فوٹو سیٹنگ */
        .quran-special {
            background-image: url('https://i.ibb.co/3ykMvjH/Quran-Alif-19.jpg') !important;
            background-size: 100% 100% !important;
            background-repeat: no-repeat !important;
            background-position: center !important;
        }

        /* بٹن کا اندرونی حصہ جو تصویر کو چھپنے نہیں دیتا */
        .inner-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); z-index: -1; border-radius: 18px;
        }

        .icon-circle { 
            width: 50px; height: 50px; background: rgba(0,0,0,0.6); 
            border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; margin-bottom: 8px; border: 1px solid var(--gold);
        }

        .tile-title { font-size: 13px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

<div class="revenue-header">
    <div style="color:var(--gold); font-weight:bold; font-size:20px;">SULTAN EMPIRE</div>
    <div class="amount" id="rev-display">$19.9840</div>
</div>

<div class="dashboard-container">
    <a href="https://quran.com/ur" target="_blank" class="tile-btn quran-special">
        <div class="inner-layer"></div>
        <div class="icon-circle"><i class="fa-solid fa-book-quran" style="color:var(--gold); font-size:25px;"></i></div>
        <span class="tile-title">QURAN PAK</span>
    </a>

    <a href="https://web.whatsapp.com" target="_blank" class="tile-btn" style="background:#25D366;">
        <div class="inner-layer"></div>
        <div class="icon-circle"><i class="fa-brands fa-whatsapp" style="color:white; font-size:30px;"></i></div>
        <span class="tile-title">WHATSAPP</span>
    </a>
</div>

<script>
    let income = 19.9840; 
    setInterval(() => { 
        income += 0.0004; 
        document.getElementById('rev-display').innerText = "$" + income.toFixed(4); 
    }, 1000);
</script>

</body>
</html>
