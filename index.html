<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <title>SULTAN GLOBAL MASTER v6.0</title>
    <style>
        :root { --gold: #ffd700; --royal: #0a0a0a; }
        body { background: var(--royal); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        #main-frame { display: flex; height: 100vh; }
        .sidebar { width: 280px; background: #111; border-right: 3px solid var(--gold); padding: 25px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .content-view { flex-grow: 1; background: #000; position: relative; }
        .nav-btn { width: 100%; padding: 18px; margin-bottom: 20px; background: #1a1a1a; 
                   border: 2px solid var(--gold); color: var(--gold); font-weight: bold; cursor: pointer !important; 
                   border-radius: 12px; transition: 0.3s; font-size: 16px; text-transform: uppercase; }
        .nav-btn:hover { background: var(--gold); color: black; transform: scale(1.03); }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        #voice-indicator { color: #00ff41; font-weight: bold; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div id="main-frame">
    <div class="sidebar">
        <h1 style="color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 10px;">SULTAN MASTER</h1>
        <button class="nav-btn" onclick="loadInternal('https://www.quran.com')">📖 QURAN ENGINE</button>
        <button class="nav-btn" onclick="window.open('https://www.daraz.pk', '_blank')">🛒 DARAZ (NEW TAB)</button>
        <button class="nav-btn" onclick="window.open('https://www.poki.com', '_blank')">🎮 PREMIUM GAMES</button>
        <button class="nav-btn" onclick="activateVoice()">🎙️ ACTIVATE VOICE</button>
        <div id="voice-indicator">EMPIRE IS LISTENING...</div>
        <div style="position: absolute; bottom: 20px; color: var(--gold); font-size: 12px;">SYSTEM: v6.0 ONLINE</div>
    </div>
    <div class="content-view">
        <iframe id="view" src="https://www.google.com/search?igu=1"></iframe>
    </div>
</div>

<script>
    function loadInternal(url) {
        document.getElementById('view').src = url;
    }

    function activateVoice() {
        const indicator = document.getElementById('voice-indicator');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            alert("Aapka browser Voice support nahi karta. Google Chrome istemal karein.");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'ur-PK';
        
        recognition.onstart = () => {
            indicator.style.display = 'block';
        };

        recognition.onresult = (event) => {
            const command = event.results[0][0].transcript;
            indicator.style.display = 'none';
            alert("Sultan ka Hukm: " + command);
            // Search function based on voice
            window.open('https://www.google.com/search?q=' + command, '_blank');
        };

        recognition.onerror = () => {
            indicator.style.display = 'none';
            alert("Mic Access Denied! Sultan, please allow microphone in browser settings.");
        };

        recognition.start();
    }
</script>
</body>
</html>
