<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN QURAN FINAL V77.0 + POWER TILES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --deep-blue: #000b29; --neon-green: #39ff14; }
        
        body { 
            margin: 0; background: radial-gradient(circle at center, #001a4d 0%, #000511 100%);
            color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        .revenue-header { 
            background: rgba(0,0,0,0.9); border-bottom: 3px solid var(--gold); 
            padding: 12px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 5px 25px rgba(0, 11, 41, 0.8); z-index: 100; 
        }

        /* Sultan Empire image in header */
        .glass-ball-frame {
            width: 80px; height: 80px; position: relative;
            border-radius: 50%; overflow: hidden; border: 2px solid var(--gold);
            box-shadow: 0 0 20px var(--gold); background: #000;
        }
        .character-spin {
            position: absolute; width: 100%; height: 100%;
            background: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png') center/cover;
            border-radius: 50%; animation: gameRotate 6s linear infinite;
        }
        @keyframes gameRotate { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        /* Quran in header - SUPER LARGE */
        .quran-header-center {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 2;
        }
        .quran-3d-circle-super-large {
            position: relative; 
            width: 200px;
            height: 200px; 
            border-radius: 50%;
            background: url('https://www.pngmart.com/files/22/Quran-PNG-Photo.png') center/cover no-repeat;
            border: 6px solid var(--gold);
            box-shadow: 0 0 60px var(--gold);
            animation: spinLikeWheelOnNail 8s infinite linear; 
            transform-style: preserve-3d;
            display: block;
            transition: all 0.3s ease;
        }
        .quran-3d-circle-super-large:hover {
            transform: scale(1.08) rotateY(360deg);
            box-shadow: 0 0 80px var(--gold);
            border-color: #fff;
        }
        @keyframes spinLikeWheelOnNail { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        /* Dashboard tiles */
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 25px; 
            display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
        }

        .tile-btn { 
            position: relative; background: var(--crystal-clr); 
            border: 4px solid transparent; border-radius: 25px; 
            padding: 20px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 140px; transition: 0.3s ease; overflow: hidden;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4); z-index: 1;
        }
        .tile-btn:hover { transform: scale(1.05); }

        .tile-btn::before {
            content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 25px; background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 400%; z-index: -2; animation: rainbowBorder 8s linear infinite;
        }
        .tile-btn::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--crystal-clr); border-radius: 21px; z-index: -1;
        }
        @keyframes rainbowBorder { 0% { background-position: 0%; } 100% { background-position: 400%; } }

        .icon-box { 
            width: 60px; height: 60px; background: #000; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 10px; border: 2px solid rgba(255,255,255,0.2);
        }

        .amount { color: var(--neon-green); font-size: 30px; font-weight: bold; }
        .tile-title { font-size: 11px; font-weight: bold; text-shadow: 2px 2px 4px #000; text-align: center; }
        
        .clr-w { --crystal-clr: rgba(37, 211, 102, 0.6); }
        .clr-b { --crystal-clr: rgba(13, 71, 161, 0.6); }
        .clr-r { --crystal-clr: rgba(183, 28, 28, 0.6); }
        .clr-g { --crystal-clr: rgba(255, 143, 0, 0.6); }
        .clr-news { --crystal-clr: rgba(0, 100, 200, 0.7); }
        .clr-kids { --crystal-clr: rgba(255, 105, 180, 0.7); }
        .clr-doc { --crystal-clr: rgba(50, 150, 50, 0.7); }
        .clr-intl { --crystal-clr: rgba(128, 0, 128, 0.7); }

        .header-left { display: flex; align-items: center; gap: 10px; flex: 1; }
        .header-right { text-align: right; flex: 1; }
    </style>
</head>

<script>
    const tuut = document.getElementById('tuut');
    const tick = document.getElementById('tick');
    let ready = false;

    function initAudio() {
        if(!ready) {
            tuut.play().then(() => { tuut.pause(); tuut.currentTime = 0; });
            tick.play().then(() => { tick.pause(); tick.currentTime = 0; });
            ready = true;
        }
    }

    function playTuut() { 
        if(ready) { 
            tuut.currentTime = 0; 
            tuut.play().catch(() => {}); 
        } 
    }
    
    function playTick() { 
        if(ready) { 
            tick.currentTime = 0; 
            tick.play().catch(() => {}); 
        } 
    }

    let count = 19.9840;
    setInterval(() => { count += 0.0004; document.getElementById('rev').innerText = "$" + count.toFixed(4); }, 1000);
    
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
    }, 1000);

    // مکمل آف لائن قرآن ایپ

            </head>

                <h1 style="color:gold;">القرآن المجید</h1>
                <p>یہاں تمام 114 سورتیں عربی متن اور اردو ترجمہ کے ساتھ ہیں۔</p>
                <p>انٹرنیٹ کے بغیر مکمل کام کرتا ہے۔</p>
                <select id="surahSelect" style="padding:10px; width:100%; margin:20px 0;">
                    <option>سورۃ الفاتحہ</option>

                    <option>سورۃ آل عمران</option>
                    <option>سورۃ النساء</option>
                    <option>سورۃ المائدہ</option>
                </select>
                <div style="font-size:28px; line-height:2;">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                <div style="color:#ddd;">شروع اللہ کے نام سے جو بڑا مہربان نہایت رحم والا ہے</div>
            </body>
            </html>
        `);
        */
    }
</script>
