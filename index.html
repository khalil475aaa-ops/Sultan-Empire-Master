<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN CRYSTAL EMPIRE V27.0</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --black: #050505; 
            --glass: rgba(255, 255, 255, 0.1);
            --glow: 0 0 15px rgba(255, 215, 0, 0.4);
        }
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #111 0%, #000 100%); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- CRYSTAL REVENUE HEADER --- */
        .revenue-header { 
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gold); 
            padding: 10px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            z-index: 100;
        }
        .amount { color: #39ff14; font-size: 30px; font-weight: bold; text-shadow: 0 0 10px #39ff14; font-family: 'Courier New', monospace; }

        /* --- GRID SETTINGS --- */
        .dashboard-container { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: grid; 
            gap: 15px;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
        }

        @media (min-width: 992px) {
            body { flex-direction: row; }
            .revenue-header { flex-direction: column; width: 250px; height: 100vh; border-bottom: none; border-right: 1px solid var(--gold); padding: 40px 10px; text-align: center; }
            .amount { margin-top: 20px; font-size: 35px; }
        }

        /* --- THE CRYSTAL BUTTON (SHISHE KA BUTTON) --- */
        .tile-btn { 
            position: relative;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            text-decoration: none;
            color: #eee;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05), 0 5px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            height: 100px; /* Size kam kar diya aapke hukm par */
        }

        /* Keyboard Lighting Effect (Side-on se Chamak) */
        .tile-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 10px;
            padding: 2px; 
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Hover: Lighting & Crystal Glow */
        .tile-btn:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3), inset 0 0 10px rgba(255,215,0,0.1);
            color: #fff;
        }

        /* Click Effect */
        .tile-btn:active { transform: translateY(1px) scale(0.98); }

        .tile-title { font-size: 14px; font-weight: bold; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .tile-icon { font-size: 24px; margin-bottom: 8px; }

        /* Categorized Crystal Glows (Under-Button Lights) */
        .glow-google { border-bottom: 3px solid #4285F4; box-shadow: 0 10px 15px -10px #4285F4; }
        .glow-islam { border-bottom: 3px solid #00ff88; box-shadow: 0 10px 15px -10px #00ff88; }
        .glow-game { border-bottom: 3px solid #ff3e3e; box-shadow: 0 10px 15px -10px #ff3e3e; }
        .glow-shop { border-bottom: 3px solid #ff9900; box-shadow: 0 10px 15px -10px #ff9900; }
        .glow-ai { border-bottom: 3px solid #00f2ff; box-shadow: 0 10px 15px -10px #00f2ff; }

    </style>
</head>
<body>

<div class="revenue-header">
    <div style="font-weight:bold; color:var(--gold); letter-spacing:2px;">SULTAN CRYSTAL NODE</div>
    <div class="amount" id="main-income">$0.0000</div>
    <div style="font-size: 10px; color: #888;">MEMORY: ONLINE</div>
</div>

<div class="dashboard-container">
    <a href="https://www.google.com" target="_blank" class="tile-btn glow-google">
        <span class="tile-icon">🔍</span><span class="tile-title">GOOGLE</span>
    </a>
    <a href="https://quran.com/ur" target="_blank" class="tile-btn glow-islam">
        <span class="tile-icon">📖</span><span class="tile-title">QURAN PAK</span>
    </a>
    <a href="https://www.youtube.com" target="_blank" class="tile-btn glow-game">
        <span class="tile-icon">📺</span><span class="tile-title">YOUTUBE</span>
    </a>
    <a href="https://web.whatsapp.com" target="_blank" class="tile-btn glow-ai">
        <span class="tile-icon">💬</span><span class="tile-title">WHATSAPP</span>
    </a>
    <a href="https://www.facebook.com" target="_blank" class="tile-btn glow-ai">
        <span class="tile-icon">🔵</span><span class="tile-title">FACEBOOK</span>
    </a>
    <a href="https://www.tiktok.com" target="_blank" class="tile-btn glow-ai">
        <span class="tile-icon">🎵</span><span class="tile-title">TIKTOK</span>
    </a>
    <a href="https://www.amazon.com" target="_blank" class="tile-btn glow-shop">
        <span class="tile-icon">🏛️</span><span class="tile-title">AMAZON</span>
    </a>
    <a href="https://www.alibaba.com" target="_blank" class="tile-btn glow-shop">
        <span class="tile-icon">📦</span><span class="tile-title">ALIBABA</span>
    </a>
    <a href="https://www.aliexpress.com" target="_blank" class="tile-btn glow-shop">
        <span class="tile-icon">🛒</span><span class="tile-title">ALIEXPRESS</span>
    </a>
    <a href="https://www.poki.com" target="_blank" class="tile-btn glow-game">
        <span class="tile-icon">🎮</span><span class="tile-title">POKI GAMES</span>
    </a>
    <a href="https://www.crazygames.com" target="_blank" class="tile-btn glow-game">
        <span class="tile-icon">🕹️</span><span class="tile-title">CRAZY GAMES</span>
    </a>
    <a href="https://www.epicgames.com" target="_blank" class="tile-btn glow-game">
        <span class="tile-icon">⚔️</span><span class="tile-title">EPIC GAMES</span>
    </a>
    <a href="https://www.y8.com" target="_blank" class="tile-btn glow-game">
        <span class="tile-icon">🎱</span><span class="tile-title">Y8 CLASSIC</span>
    </a>
    <a href="https://runwayml.com" target="_blank" class="tile-btn glow-ai">
        <span class="tile-icon">🎬</span><span class="tile-title">RUNWAY AI</span>
    </a>
    <a href="https://klingai.com" target="_blank" class="tile-btn glow-ai">
        <span class="tile-icon">🤖</span><span class="tile-title">KLING AI</span>
    </a>
    <a href="https://pika.art" target="_blank" class="tile-btn glow-ai">
        <span class="tile-icon">✨</span><span class="tile-title">PIKA AI</span>
    </a>
    <a href="https://www.bbc.com" target="_blank" class="tile-btn glow-google">
        <span class="tile-icon">📰</span><span class="tile-title">BBC NEWS</span>
    </a>
</div>

<script>
    // Sultan, Memory Load
    let income = parseFloat(localStorage.getItem('sultan_income')) || 0.8656; 

    function updateDisplay() {
        document.getElementById('main-income').innerText = "$" + income.toFixed(4);
        localStorage.setItem('sultan_income', income);
    }

    setInterval(() => {
        income += 0.0004; // Speed thodi aur barha di
        updateDisplay();
    }, 1000);

    updateDisplay(); 
</script>
</body>
</html>
