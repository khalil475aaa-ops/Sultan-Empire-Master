<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN NEON CIRCLE V33.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER */
        .revenue-header { background: #000; border-bottom: 2px solid var(--gold); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); z-index: 100; }
        .amount { color: #39ff14; font-size: 28px; font-weight: bold; text-shadow: 0 0 10px #39ff14; }

        /* GRID */
        .dashboard-container { flex-grow: 1; overflow-y: auto; padding: 15px; display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }

        /* THE CRYSTAL BUTTON WITH UNDERGLOW */
        .tile-btn { 
            position: relative;
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px;
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 120px;
            /* Default Underglow Lighting */
            box-shadow: 0 10px 20px -5px rgba(255, 255, 255, 0.2);
        }

        .tile-btn:hover { transform: translateY(-5px) scale(1.03); border-color: #fff; }

        /* LOGO CIRCLE */
        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2);
        }

        /* REAL COLORS FOR ICONS */
        .fa-whatsapp { color: #25D366; }
        .fa-facebook { color: #1877F2; }
        .fa-youtube { color: #FF0000; }
        .fa-amazon { color: #FF9900; }
        .fa-google { color: #4285F4; }
        .fa-tiktok { color: #FFFFFF; }
        .fa-book-quran { color: #00FF88; }

        /* KEYBOARD UNDERGLOW LIGHTS (Special Classes) */
        .glow-blue { box-shadow: 0 12px 25px -5px rgba(24, 119, 242, 0.7); }
        .glow-green { box-shadow: 0 12px 25px -5px rgba(37, 211, 102, 0.7); }
        .glow-red { box-shadow: 0 12px 25px -5px rgba(255, 0, 0, 0.7); }
        .glow-gold { box-shadow: 0 12px 25px -5px rgba(255, 215, 0, 0.7); }
        .glow-purple { box-shadow: 0 12px 25px -5px rgba(255, 0, 255, 0.7); }

        .tile-title { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; text-shadow: 0 1px 3px black; }
    </style>
</head>
<body>

<div class="revenue-header">
    <div style="font-weight:bold; color:var(--gold);">SULTAN NEON HUB</div>
    <div class="amount" id="main-income">$0.0000</div>
    <div style="font-size: 10px; color: #888;">UNDERGLOW V33.0</div>
</div>

<div class="dashboard-container">
    <a href="https://quran.com/ur" target="_blank" class="tile-btn glow-green">
        <div class="icon-circle" style="border-color:#00ff88;"><i class="fa-solid fa-book-quran" style="font-size: 28px;"></i></div>
        <span class="tile-title">Quran Pak</span>
    </a>

    <a href="https://www.google.com" target="_blank" class="tile-btn glow-blue">
        <div class="icon-circle" style="border-color:#4285f4;"><i class="fa-brands fa-google" style="font-size: 28px;"></i></div>
        <span class="tile-title">Google</span>
    </a>

    <a href="https://web.whatsapp.com" target="_blank" class="tile-btn glow-green">
        <div class="icon-circle" style="border-color:#25d366;"><i class="fa-brands fa-whatsapp" style="font-size: 30px;"></i></div>
        <span class="tile-title">WhatsApp</span>
    </a>

    <a href="https://www.facebook.com" target="_blank" class="tile-btn glow-blue">
        <div class="icon-circle" style="border-color:#1877f2;"><i class="fa-brands fa-facebook" style="font-size: 30px;"></i></div>
        <span class="tile-title">Facebook</span>
    </a>

    <a href="https://www.youtube.com" target="_blank" class="tile-btn glow-red">
        <div class="icon-circle" style="border-color:#ff0000;"><i class="fa-brands fa-youtube" style="font-size: 28px;"></i></div>
        <span class="tile-title">YouTube</span>
    </a>

    <a href="https://www.tiktok.com" target="_blank" class="tile-btn glow-gold">
        <div class="icon-circle" style="border-color:#fff;"><i class="fa-brands fa-tiktok" style="font-size: 28px;"></i></div>
        <span class="tile-title">TikTok</span>
    </a>

    <a href="https://www.amazon.com" target="_blank" class="tile-btn glow-gold">
        <div class="icon-circle" style="border-color:#ff9900;"><i class="fa-brands fa-amazon" style="font-size: 26px;"></i></div>
        <span class="tile-title">Amazon</span>
    </a>

    <a href="https://www.alibaba.com" target="_blank" class="tile-btn glow-red">
        <div class="icon-circle" style="border-color:#ff6a00;"><i class="fa-solid fa-box" style="font-size: 24px;"></i></div>
        <span class="tile-title">Alibaba</span>
    </a>

    <a href="https://www.aliexpress.com" target="_blank" class="tile-btn glow-red">
        <div class="icon-circle" style="border-color:#e62e04;"><i class="fa-solid fa-cart-shopping" style="font-size: 24px;"></i></div>
        <span class="tile-title">AliExpress</span>
    </a>

    <a href="https://www.poki.com" target="_blank" class="tile-btn glow-red">
        <div class="icon-circle" style="border-color:#ff3e3e;"><i class="fa-solid fa-gamepad" style="font-size: 26px;"></i></div>
        <span class="tile-title">Poki Games</span>
    </a>

    <a href="https://www.crazygames.com" target="_blank" class="tile-btn glow-gold">
        <div class="icon-circle" style="border-color:#ffd700;"><i class="fa-solid fa-headset" style="font-size: 26px;"></i></div>
        <span class="tile-title">Crazy Games</span>
    </a>

    <a href="https://runwayml.com" target="_blank" class="tile-btn glow-purple">
        <div class="icon-circle" style="border-color:#ff00ff;"><i class="fa-solid fa-video" style="font-size: 24px;"></i></div>
        <span class="tile-title">Runway AI</span>
    </a>

    <a href="https://klingai.com" target="_blank" class="tile-btn glow-blue" style="box-shadow: 0 12px 25px -5px rgba(0, 242, 255, 0.7);">
        <div class="icon-circle" style="border-color:#00f2ff;"><i class="fa-solid fa-robot" style="font-size: 24px;"></i></div>
        <span class="tile-title">Kling AI</span>
    </a>
    
    <a href="https://www.epicgames.com" target="_blank" class="tile-btn glow-gold">
        <div class="icon-circle" style="border-color:#fff;"><i class="fa-solid fa-gun" style="font-size: 24px;"></i></div>
        <span class="tile-title">Epic Games</span>
    </a>

    <a href="https://www.y8.com" target="_blank" class="tile-btn glow-red">
        <div class="icon-circle" style="border-color:#ff0000;"><i class="fa-solid fa-circle-play" style="font-size: 26px;"></i></div>
        <span class="tile-title">Y8 Games</span>
    </a>

    <a href="https://pika.art" target="_blank" class="tile-btn glow-gold">
        <div class="icon-circle" style="border-color:#fff;"><i class="fa-solid fa-wand-magic-sparkles" style="font-size: 24px;"></i></div>
        <span class="tile-title">Pika AI</span>
    </a>

    <a href="https://www.bbc.com" target="_blank" class="tile-btn glow-red">
        <div class="icon-circle" style="border-color:#bb1919;"><i class="fa-solid fa-newspaper" style="font-size: 24px;"></i></div>
        <span class="tile-title">BBC News</span>
    </a>
</div>

<script>
    let income = parseFloat(localStorage.getItem('sultan_income')) || 0.8656; 
    function updateDisplay() {
        document.getElementById('main-income').innerText = "$" + income.toFixed(4);
        localStorage.setItem('sultan_income', income);
    }
    setInterval(() => { income += 0.0004; updateDisplay(); }, 1000);
    updateDisplay(); 
</script>
</body>
</html>
