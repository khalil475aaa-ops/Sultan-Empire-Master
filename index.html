<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN ULTIMATE EMPIRE</title>
    <style>
        :root { --gold: #ffd700; --black: #050505; --neon-blue: #00f2ff; --game-red: #ff3e3e; }
        body { margin: 0; background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* REVENUE BAR */
        .revenue-header { background: #111; border-bottom: 2px solid var(--gold); padding: 10px; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .amount { color: #39ff14; font-size: 26px; font-weight: bold; text-shadow: 0 0 10px #39ff14; }

        /* SCROLLABLE TOOLBAR */
        .app-toolbar { 
            display: flex; overflow-x: auto; background: #1a1a1a; padding: 10px; gap: 10px; border-bottom: 1px solid #333;
            scrollbar-width: thin; scrollbar-color: var(--gold) #1a1a1a;
        }
        .app-toolbar::-webkit-scrollbar { height: 5px; }
        .app-toolbar::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .btn { 
            padding: 10px 18px; background: #252525; border: 1px solid #444; color: #ddd; 
            border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .btn:hover { border-color: var(--gold); background: #333; }
        
        /* Categories Color Coding */
        .btn-islam { border-color: #00ff88; color: #00ff88; }
        .btn-ai { border-color: var(--neon-blue); color: var(--neon-blue); }
        .btn-game { border-color: var(--game-red); color: var(--game-red); font-weight: bold; }
        .btn-shop { border-color: var(--gold); color: var(--gold); }

        /* MAIN CONTENT */
        .main-viewer { flex-grow: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="revenue-header">
    <div style="font-size: 12px; color: var(--gold);">SULTAN EMPIRE MASTER</div>
    <div class="amount" id="main-income">$0.7600</div>
    <div style="font-size: 10px;">PRO V24.0</div>
</div>

<div class="app-toolbar">
    <button class="btn btn-islam" onclick="load('https://quran.com/ur')">📖 QURAN / ISLAM 360</button>
    
    <button class="btn" onclick="load('https://www.google.com/search?igu=1')">🔍 GOOGLE</button>
    <button class="btn" onclick="window.open('https://web.whatsapp.com', '_blank')">💬 WHATSAPP</button>
    <button class="btn" onclick="window.open('https://www.facebook.com', '_blank')">🔵 FACEBOOK</button>
    <button class="btn" onclick="window.open('https://www.tiktok.com', '_blank')">🎵 TIKTOK</button>

    <button class="btn btn-game" onclick="window.open('https://www.poki.com', '_blank')">🎮 POKI GAMES</button>
    <button class="btn btn-game" onclick="window.open('https://www.crazygames.com', '_blank')">🕹️ CRAZY GAMES</button>
    <button class="btn btn-game" onclick="window.open('https://www.epicgames.com', '_blank')">⚔️ EPIC GAMES (PUBG)</button>
    <button class="btn btn-game" onclick="window.open('https://www.y8.com', '_blank')">🎱 Y8 GAMES</button>

    <button class="btn btn-ai" onclick="window.open('https://runwayml.com', '_blank')">🎬 RUNWAY AI</button>
    <button class="btn btn-ai" onclick="window.open('https://klingai.com', '_blank')">🤖 KLING AI</button>
    <button class="btn btn-ai" onclick="window.open('https://pika.art', '_blank')">✨ PIKA AI</button>

    <button class="btn btn-shop" onclick="window.open('https://www.aliexpress.com', '_blank')">🛒 ALIEXPRESS</button>
    <button class="btn btn-shop" onclick="window.open('https://www.alibaba.com', '_blank')">📦 ALIBABA</button>
    <button class="btn btn-shop" onclick="window.open('https://www.amazon.com', '_blank')">🏛️ AMAZON</button>
</div>

<div class="main-viewer">
    <iframe id="global-frame" src="https://www.google.com/search?igu=1"></iframe>
</div>

<script>
    let currentIncome = 0.7600; // Aapka naya balance yahin se shuru hoga
    setInterval(() => {
        currentIncome += 0.0002; 
        document.getElementById('main-income').innerText = "$" + currentIncome.toFixed(4);
    }, 1000);

    function load(url) {
        document.getElementById('global-frame').src = url;
    }
</script>
</body>
</html>
