<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SULTAN EMPIRE - 3 INCH ICONS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #ffd700; 
            --deep-blue: #000b29; 
            --neon-green: #39ff14;
        }
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #001a4d 0%, #000511 100%);
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        .revenue-header { 
            background: rgba(0,0,0,0.9); 
            border-bottom: 3px solid var(--gold); 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 5px 25px rgba(0, 11, 41, 0.8); 
            z-index: 100; 
        }

        /* Sultan Empire image in header */
        .glass-ball-frame {
            width: 80px; 
            height: 80px; 
            position: relative;
            border-radius: 50%; 
            overflow: hidden; 
            border: 2px solid var(--gold);
            box-shadow: 0 0 20px var(--gold); 
            background: #000;
        }
        .character-spin {
            position: absolute; 
            width: 100%; 
            height: 100%;
            background: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png') center/cover;
            border-radius: 50%; 
            animation: gameRotate 6s linear infinite;
        }
        @keyframes gameRotate { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        /* Quran in header - CENTER, SUPER LARGE */
        .quran-header-center {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 2;
        }
        .quran-3d-circle-super-large {
            position: relative; 
            width: 200px;
            height: 200px; 
            border-radius: 50%;
            background: url('https://www.pngmart.com/files/22/Quran-PNG-Photo.png') center/cover no-repeat;
            border: 6px solid var(--gold);
            box-shadow: 0 0 60px var(--gold);
            animation: spinLikeWheelOnNail 8s infinite linear; 
            transform-style: preserve-3d;
            display: block;
            transition: all 0.3s ease;
        }
        .quran-3d-circle-super-large:hover {
            transform: scale(1.08) rotateY(360deg);
            box-shadow: 0 0 80px var(--gold);
            border-color: #fff;
        }
        @keyframes spinLikeWheelOnNail { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        /* Dashboard tiles - BIG ICONS 3 INCH */
        .dashboard-container { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 25px; 
            display: grid; 
            gap: 25px; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); /* 3 انچ کے قریب */
        }

        .tile-btn { 
            position: relative; 
            background: transparent; /* کوئی بیک گراؤنڈ نہیں */
            border: none; /* کوئی بارڈر نہیں */
            border-radius: 50%; /* مکمل گول */
            width: 250px; /* 3 انچ */
            height: 250px; /* 3 انچ */
            margin: 0 auto;
            text-decoration: none; 
            color: #fff;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            transition: 0.3s ease; 
            z-index: 1;
        }
        
        .tile-btn:hover { 
            transform: scale(1.02); 
        }

        /* لائٹس اور دھواں مکمل ختم */
        .tile-btn::before, .tile-btn::after {
            display: none; /* تمام اثرات ختم */
        }

        /* بہت بڑے آئیکون - 3 انچ */
        .icon-box { 
            width: 200px; 
            height: 200px; 
            background: rgba(0, 0, 0, 0.2); /* ہلکا شفاف */
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-bottom: 15px; 
            border: 3px solid var(--gold);
            box-shadow: 0 0 40px var(--gold);
        }

        .icon-box i {
            font-size: 120px !important; /* بہت بڑے آئیکون */
            filter: drop-shadow(0 0 15px currentColor);
        }

        .tile-title { 
            font-size: 18px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px #000; 
            text-align: center;
            color: var(--gold);
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 30px;
            letter-spacing: 1px;
        }

        .amount { 
            color: var(--neon-green); 
            font-size: 30px; 
            font-weight: bold; 
            text-shadow: 0 0 15px var(--neon-green);
        }
        
        #clock { 
            color: var(--gold); 
            font-size: 14px; 
            font-weight: bold;
        }

        /* کلر کلاسز - صرف آئیکون کلر کے لیے */
        .clr-w i { color: #25d366; }
        .clr-b i { color: #1877f2; }
        .clr-r i { color: #ff0000; }
        .clr-g i { color: #ff8c00; }
        .clr-news i { color: #ffffff; }
        .clr-kids i { color: #ff69b4; }
        .clr-doc i { color: #ffd700; }
        .clr-intl i { color: #ffd700; }

        .header-left { display: flex; align-items: center; gap: 10px; flex: 1; }
        .header-right { text-align: right; flex: 1; }
        
        /* موبائل کے لیے ایڈجسٹمنٹ */
        @media (max-width: 600px) {
            .dashboard-container { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 15px;
                padding: 15px;
            }
            .tile-btn { 
                width: 180px; 
                height: 180px; 
            }
            .icon-box { 
                width: 140px; 
                height: 140px; 
            }
            .icon-box i {
                font-size: 85px !important;
            }
            .tile-title { 
                font-size: 14px; 
                padding: 5px 12px;
            }
        }
        
        /* چھوٹی اسکرین کے لیے */
        @media (max-width: 400px) {
            .tile-btn { 
                width: 150px; 
                height: 150px; 
            }
            .icon-box { 
                width: 115px; 
                height: 115px; 
            }
            .icon-box i {
                font-size: 70px !important;
            }
        }
    </style>
</head>
<body onclick="initAudio()">

<!-- Mobile keypad tone sound -->
<audio id="tuut" src="https://www.soundjay.com/buttons/button-37.mp3" preload="auto"></audio>
<audio id="tick" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

<div class="revenue-header">
    <!-- Left side: Sultan Empire with small image -->
    <div class="header-left">
        <div class="glass-ball-frame"><div class="character-spin"></div></div>
        <div style="font-weight:bold; color:var(--gold); font-size: 18px; margin-left: 10px;">SULTAN EMPIRE</div>
    </div>

    <!-- CENTER: SUPER LARGE QURAN -->
    <div class="quran-header-center">
        <a href="https://quran.com/ur" target="_blank" class="quran-3d-circle-super-large" onmouseover="playTuut()" onmousedown="playTick()" title="قرآن مجید - اردو ترجمہ"></a>
    </div>

    <!-- Right side: revenue + clock -->
    <div class="header-right">
        <div class="amount" id="rev">$19.9840</div>
        <div id="clock" style="color:var(--gold); font-size:12px;">00:00:00</div>
    </div>
</div>

<div class="dashboard-container">
    <!-- Sultan Empire tile -->
    <div style="grid-column: span 1; display: flex; justify-content: center; align-items: center;">
        <div class="tile-btn" style="cursor:default;" onmouseover="playTuut()" onmousedown="playTick()">
            <div class="icon-box" style="border: 3px solid var(--gold);">
                <div style="width:160px; height:160px; border-radius:50%; background: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png') center/cover; border: 2px solid var(--gold); animation: gameRotate 6s linear infinite;"></div>
            </div>
            <span class="tile-title">سلطان</span>
        </div>
    </div>

    <!-- === پانچ بنیادی بٹن === -->
    
    <!-- WhatsApp -->
    <a href="https://web.whatsapp.com" target="_blank" class="tile-btn clr-w" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-whatsapp"></i></div>
        <span class="tile-title">WhatsApp</span>
    </a>

    <!-- YouTube -->
    <a href="https://www.youtube.com" target="_blank" class="tile-btn clr-r" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-youtube"></i></div>
        <span class="tile-title">YouTube</span>
    </a>

    <!-- Facebook -->
    <a href="https://www.facebook.com" target="_blank" class="tile-btn clr-b" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-facebook"></i></div>
        <span class="tile-title">Facebook</span>
    </a>

    <!-- TikTok -->
    <a href="https://www.tiktok.com" target="_blank" class="tile-btn clr-g" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-tiktok"></i></div>
        <span class="tile-title">TikTok</span>
    </a>

    <!-- Google -->
    <a href="https://www.google.com" target="_blank" class="tile-btn clr-b" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-google"></i></div>
        <span class="tile-title">Google</span>
    </a>

    <!-- 9 نئے بٹن -->
    <a href="https://www.bbc.com/news/world" target="_blank" class="tile-btn clr-news" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-newspaper"></i></div>
        <span class="tile-title">BBC World News</span>
    </a>
    <a href="https://www.aljazeera.com/live/" target="_blank" class="tile-btn clr-intl" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-globe"></i></div>
        <span class="tile-title">Al Jazeera</span>
    </a>
    <a href="https://edition.cnn.com/live" target="_blank" class="tile-btn clr-news" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-tower-broadcast"></i></div>
        <span class="tile-title">CNN Live</span>
    </a>
    <a href="https://iview.abc.net.au/show/kids" target="_blank" class="tile-btn clr-kids" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-child"></i></div>
        <span class="tile-title">ABC Kids</span>
    </a>
    <a href="https://www.cocomelon.com/" target="_blank" class="tile-btn clr-kids" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-music"></i></div>
        <span class="tile-title">Cocomelon</span>
    </a>
    <a href="https://www.chuchutv.com/" target="_blank" class="tile-btn clr-kids" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-train"></i></div>
        <span class="tile-title">ChuChu TV</span>
    </a>
    <a href="https://disneynow.com/all-shows/disney-junior" target="_blank" class="tile-btn clr-kids" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
        <span class="tile-title">Disney Jr</span>
    </a>
    <a href="https://www.nationalgeographic.com/tv/" target="_blank" class="tile-btn clr-doc" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-earth-asia"></i></div>
        <span class="tile-title">Nat Geo</span>
    </a>
    <a href="https://www.discoveryplus.com/" target="_blank" class="tile-btn clr-doc" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-dragon"></i></div>
        <span class="tile-title">Discovery</span>
    </a>

    <!-- باقی تمام بٹن -->
    <a href="https://www.amazon.com" target="_blank" class="tile-btn clr-g" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-amazon"></i></div>
        <span class="tile-title">Amazon</span>
    </a>
    <a href="https://klingai.com" target="_blank" class="tile-btn clr-b" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-robot"></i></div>
        <span class="tile-title">Kling AI</span>
    </a>
    <a href="https://runwayml.com" target="_blank" class="tile-btn clr-g" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-video"></i></div>
        <span class="tile-title">Runway AI</span>
    </a>
    <a href="https://www.aliexpress.com" target="_blank" class="tile-btn clr-r" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-cart-shopping"></i></div>
        <span class="tile-title">AliExpress</span>
    </a>
    <a href="https://www.alibaba.com" target="_blank" class="tile-btn clr-g" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-box"></i></div>
        <span class="tile-title">Alibaba</span>
    </a>
    <a href="https://www.epicgames.com" target="_blank" class="tile-btn clr-g" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-gun"></i></div>
        <span class="tile-title">Epic Games</span>
    </a>
    <a href="https://www.y8.com" target="_blank" class="tile-btn clr-r" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-circle-play"></i></div>
        <span class="tile-title">Y8 Games</span>
    </a>
    <a href="https://pika.art" target="_blank" class="tile-btn clr-g" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
        <span class="tile-title">Pika AI</span>
    </a>
    <a href="https://www.poki.com" target="_blank" class="tile-btn clr-r" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-gamepad"></i></div>
        <span class="tile-title">Poki Games</span>
    </a>
    <a href="https://www.crazygames.com" target="_blank" class="tile-btn clr-g" onmouseover="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-headset"></i></div>
        <span class="tile-title">Crazy Games</span>
    </a>
</div>

<script>
    const tuut = document.getElementById('tuut');
    const tick = document.getElementById('tick');
    let ready = false;

    function initAudio() {
        if(!ready) {
            tuut.play().then(() => { tuut.pause(); tuut.currentTime = 0; });
            tick.play().then(() => { tick.pause(); tick.currentTime = 0; });
            ready = true;
        }
    }

    function playTuut() { 
        if(ready) { 
            tuut.currentTime = 0; 
            tuut.play().catch(() => {}); 
        } 
    }
    
    function playTick() { 
        if(ready) { 
            tick.currentTime = 0; 
            tick.play().catch(() => {}); 
        } 
    }

    let count = 19.9840;
    setInterval(() => { count += 0.0004; document.getElementById('rev').innerText = "$" + count.toFixed(4); }, 1000);
    
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
    }, 1000);
</script>
</body>
</html>
