<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN QURAN MASTER V72.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --deep-blue: #000b29; }
        
        body { 
            margin: 0; background: radial-gradient(circle at center, #001a4d 0%, #000511 100%);
            color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        .revenue-header { 
            background: rgba(0,0,0,0.9); border-bottom: 3px solid var(--gold); 
            padding: 12px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 5px 25px rgba(0, 11, 41, 0.8); z-index: 100; 
        }

        /* --- 3D ROUND FACE --- */
        .glass-ball-frame {
            width: 85px; height: 85px; position: relative;
            border-radius: 50%; overflow: hidden; border: 2px solid var(--gold);
            box-shadow: 0 0 20px var(--gold); background: #000;
        }
        .character-spin {
            position: absolute; width: 100%; height: 100%;
            background: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png') center/cover;
            border-radius: 50%; animation: gameRotate 6s linear infinite;
            transform-style: preserve-3d;
        }
        @keyframes gameRotate { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        /* --- BUTTONS GRID --- */
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 25px; 
            display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            background: rgba(0, 11, 41, 0.3); backdrop-filter: blur(5px);
        }

        .tile-btn { 
            position: relative; background: var(--crystal-clr); 
            border: 4px solid transparent; border-radius: 25px; 
            padding: 20px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 140px; transition: 0.4s ease; overflow: hidden;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4); z-index: 1;
        }
        
        /* رینبو بارڈر اینیمیشن */
        .tile-btn::before {
            content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 25px;
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 400%; z-index: -2;
            animation: rainbowBorder 8s linear infinite;
        }
        
        .tile-btn::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--crystal-clr); border-radius: 21px; z-index: -1;
        }

        @keyframes rainbowBorder { 0% { background-position: 0%; } 100% { background-position: 400%; } }

        /* --- THE PERFECT QURAN IMAGE BUTTON --- */
        .quran-btn-new {
            /* رحل پر کھلا ہوا قرآن پاک جس پر الفاتحہ لکھی ہو - پرفیکٹ امیج */
            background-image: url('https://i.ibb.co/q9mNMT0/quran-open-rehal-surah.jpg') !important;
            background-size: cover !important;
            background-position: center !important;
            border: 4px solid var(--gold) !important;
        }
        
        /* قرآن پاک کے اوپر والا آئیکون اور لیبل */
        .icon-box-q { 
            width: 65px; height: 65px; background: rgba(0,0,0,0.7); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 8px; border: 2px solid var(--gold);
        }

        /* باقی ایپس کے لیے سادہ کالا دائرہ */
        .icon-box { 
            width: 65px; height: 65px; background: #000; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 12px; border: 2px solid rgba(255,255,255,0.2); z-index: 5;
        }

        .amount { color: #39ff14; font-size: 30px; font-weight: bold; text-shadow: 0 0 15px #39ff14; }
        .tile-title { font-size: 11px; font-weight: bold; text-transform: uppercase; z-index: 5; text-shadow: 2px 2px 4px #000; }
        .clr-q { --crystal-clr: rgba(0, 43, 22, 0.7); }
        .clr-w { --crystal-clr: rgba(37, 211, 102, 0.6); }
        .clr-b { --crystal-clr: rgba(13, 71, 161, 0.6); }
        .clr-r { --crystal-clr: rgba(183, 28, 28, 0.6); }
        .clr-g { --crystal-clr: rgba(255, 143, 0, 0.6); }
    </style>
</head>

<script>
    const tuut = document.getElementById('tuut');
    const tick = document.getElementById('tick');
    let isAudioReady = false;

    // براؤزر سیکیورٹی کے لیے آڈیو کو ایکٹیو کرنے کے لیے پہلے کلک کا انتظار کریں
    function initAudio() {
        if(!isAudioReady) {
            tuut.play().then(() => { tuut.pause(); tuut.currentTime = 0; });
            tick.play().then(() => { tick.pause(); tick.currentTime = 0; });
            isAudioReady = true;
        }
    }

    // ٹیوٹ ٹیوٹ آواز (On Hover)
    function playTuut() { if(isAudioReady) { tuut.currentTime = 0; tuut.play().catch(e=>{}); } }
    // ٹو ٹو آواز (On Click)
    function playTick() { if(isAudioReady) { tick.currentTime = 0; tick.play().catch(e=>{}); } }

    let income =parseFloat(localStorage.getItem('sultan_income')) || 19.9840; 
    setInterval(() => { 
        income += 0.0004; 
        document.getElementById('rev-count').innerText = "$" + income.toFixed(4); 
        localStorage.setItem('sultan_income', income); 
    }, 1000);
</script>
