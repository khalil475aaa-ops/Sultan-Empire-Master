<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN QURAN MASTER V75.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --deep-blue: #000b29; }
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #001a4d 0%, #000511 100%);
            color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }

        .revenue-header { 
            background: rgba(0,0,0,0.9); border-bottom: 3px solid var(--gold); 
            padding: 12px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 5px 25px rgba(0, 11, 41, 0.8); z-index: 100; 
        }

        /* --- 3D ROUND FACE (EXACTLY FROM 68) --- */
        .glass-ball-frame {
            width: 85px; height: 85px; position: relative;
            border-radius: 50%; overflow: hidden; border: 2px solid var(--gold);
            box-shadow: 0 0 20px var(--gold); background: #000;
        }
        
        .character-spin {
            position: absolute; width: 100%; height: 100%;
            background: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png') center/cover;
            border-radius: 50%;
            animation: gameRotate 6s linear infinite;
            transform-style: preserve-3d;
        }
        @keyframes gameRotate { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        /* --- DASHBOARD & RAINBOW BUTTONS (EXACTLY FROM 68) --- */
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 25px; 
            display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            background: rgba(0, 11, 41, 0.3); backdrop-filter: blur(5px);
        }

        .tile-btn { 
            position: relative; background: var(--crystal-clr); 
            border: 4px solid transparent; border-radius: 25px; 
            padding: 20px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 140px; transition: 0.3s ease; overflow: hidden;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4); z-index: 1;
        }
        
        /* RAINBOW BORDER ANIMATION */
        .tile-btn::before {
            content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 25px;
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 400%; z-index: -2;
            animation: rainbowBorder 8s linear infinite;
        }
        
        .tile-btn::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--crystal-clr); border-radius: 21px; z-index: -1;
        }

        @keyframes rainbowBorder { 0% { background-position: 0%; } 100% { background-position: 400%; } }

        /* --- YOUR UPLOADED QURAN IMAGE (PERFECT FIT) --- */
        .quran-btn-uploaded {
            /* میں نے آپ کی دی ہوئی تصویر کا ڈائریکٹ لنک یہاں لگا دیا ہے */
            background: url('https://i.ibb.co/3yk3mG4/Quran-Alif-19.jpg') center/contain no-repeat !important;
            background-color: #002b16 !important;
            border: 4px solid var(--gold) !important;
        }

        .icon-box { 
            width: 65px; height: 65px; background: #000; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 12px; border: 2px solid rgba(255,255,255,0.2); z-index: 5;
        }

        .amount { color: #39ff14; font-size: 30px; font-weight: bold; text-shadow: 0 0 15px #39ff14; }
        .tile-title { font-size: 11px; font-weight: bold; text-transform: uppercase; z-index: 5; text-shadow: 2px 2px 4px #000; }
        
        /* COLORS FROM 68 */
        .clr-w { --crystal-clr: rgba(37, 211, 102, 0.6); }
        .clr-b { --crystal-clr: rgba(13, 71, 161, 0.6); }
        .clr-r { --crystal-clr: rgba(183, 28, 28, 0.6); }
        .clr-g { --crystal-clr: rgba(255, 143, 0, 0.6); }
    </style>
</head>
<body onclick="startEngine()">

<audio id="tuut" src="https://www.soundjay.com/buttons/button-37.mp3" preload="auto"></audio>
<audio id="tick" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

<div class="revenue-header">
    <div class="profile-section" style="display:flex; align-items:center;">
        <div class="glass-ball-frame">
            <div class="character-spin"></div>
        </div>
        <div style="font-weight:bold; color:var(--gold); font-size: 18px; margin-left: 10px;">SULTAN EMPIRE</div>
    </div>
    <div class="amount" id="rev-val">$19.9840</div>
</div>

<div class="dashboard-container">
    <a href="https://quran.com/ur" target="_blank" class="tile-btn quran-btn-uploaded" onmouseenter="playTuut()" onmousedown="playTick()">
        <span class="tile-title" style="margin-top: auto; background: rgba(0,0,0,0.8); padding: 2px 10px; border-radius: 8px; color: var(--gold); border: 1px solid var(--gold);">قرآن پاک پڑھیں</span>
    </a>

    <a href="https://web.whatsapp.com" target="_blank" class="tile-btn clr-w" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-whatsapp" style="color:#25d366; font-size:40px;"></i></div>
        <span class="tile-title">WhatsApp</span>
    </a>
    <a href="https://www.facebook.com" target="_blank" class="tile-btn clr-b" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-facebook" style="color:#1877f2; font-size:40px;"></i></div>
        <span class="tile-title">Facebook</span>
    </a>
    <a href="https://www.youtube.com" target="_blank" class="tile-btn clr-r" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-youtube" style="color:#ff0000; font-size:40px;"></i></div>
        <span class="tile-title">YouTube</span>
    </a>
    <a href="https://www.tiktok.com" target="_blank" class="tile-btn clr-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-tiktok" style="color:#fff; font-size:35px;"></i></div>
        <span class="tile-title">TikTok</span>
    </a>
    <a href="https://www.google.com" target="_blank" class="tile-btn clr-b" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-google" style="color:#4285f4; font-size:35px;"></i></div>
        <span class="tile-title">Google</span>
    </a>
    <a href="https://www.amazon.com" target="_blank" class="tile-btn clr-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-brands fa-amazon" style="color:#ff9900; font-size:35px;"></i></div>
        <span class="tile-title">Amazon</span>
    </a>
    <a href="https://klingai.com" target="_blank" class="tile-btn clr-b" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-robot" style="color:#00f2ff; font-size:30px;"></i></div>
        <span class="tile-title">Kling AI</span>
    </a>
    <a href="https://runwayml.com" target="_blank" class="tile-btn clr-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-video" style="color:#ff00ff; font-size:30px;"></i></div>
        <span class="tile-title">Runway AI</span>
    </a>
    <a href="https://www.aliexpress.com" target="_blank" class="tile-btn clr-r" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-cart-shopping" style="color:#fff; font-size:30px;"></i></div>
        <span class="tile-title">AliExpress</span>
    </a>
    <a href="https://www.alibaba.com" target="_blank" class="tile-btn clr-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-box" style="color:#fff; font-size:30px;"></i></div>
        <span class="tile-title">Alibaba</span>
    </a>
    <a href="https://www.epicgames.com" target="_blank" class="tile-btn clr-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-gun" style="color:#fff; font-size:30px;"></i></div>
        <span class="tile-title">Epic Games</span>
    </a>
    <a href="https://www.y8.com" target="_blank" class="tile-btn clr-r" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-circle-play" style="color:#fff; font-size:38px;"></i></div>
        <span class="tile-title">Y8 Games</span>
    </a>
    <a href="https://pika.art" target="_blank" class="tile-btn clr-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-wand-magic-sparkles" style="color:#fff; font-size:30px;"></i></div>
        <span class="tile-title">Pika AI</span>
    </a>
    <a href="https://www.bbc.com" target="_blank" class="tile-btn clr-r" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-newspaper" style="color:#fff; font-size:30px;"></i></div>
        <span class="tile-title">BBC News</span>
    </a>
    <a href="https://www.poki.com" target="_blank" class="tile-btn clr-r" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-gamepad" style="color:#ff3e3e; font-size:38px;"></i></div>
        <span class="tile-title">Poki Games</span>
    </a>
    <a href="https://www.crazygames.com" target="_blank" class="tile-btn clr-g" onmouseenter="playTuut()" onmousedown="playTick()">
        <div class="icon-box"><i class="fa-solid fa-headset" style="color:#fff; font-size:35px;"></i></div>
        <span class="tile-title">Crazy Games</span>
    </a>
</div>

<script>
    const tuut = document.getElementById('tuut');
    const tick = document.getElementById('tick');
    let isLive = false;

    function startEngine() {
        if(!isLive) {
            tuut.play().then(() => { tuut.pause(); tuut.currentTime = 0; });
            tick.play().then(() => { tick.pause(); tick.currentTime = 0; });
            isLive = true;
        }
    }

    function playTuut() { if(isLive) { tuut.currentTime = 0; tuut.play().catch(e=>{}); } }
    function playTick() { if(isLive) { tick.currentTime = 0; tick.play().catch(e=>{}); } }

    let mon = 19.9840;
    setInterval(() => { mon += 0.0004; document.getElementById('rev-val').innerText = "$" + mon.toFixed(4); }, 1000);
</script>
</body>
</html>
