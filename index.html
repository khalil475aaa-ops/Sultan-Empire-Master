<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <title>SULTAN MASTER ENGINE v5.0</title>
    <style>
        :root { --gold: #ffd700; --emerald: #008f39; --royal: #1a1a2e; }
        body { background: var(--royal); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* Dashboard Layout */
        #main-frame { display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #0f0f1b; border-right: 2px solid var(--gold); padding: 20px; }
        .content-view { flex-grow: 1; background: #161625; position: relative; }
        
        /* Luxury Buttons */
        .nav-btn { width: 100%; padding: 15px; margin-bottom: 15px; background: linear-gradient(45deg, #111, #333); 
                   border: 1px solid var(--gold); color: var(--gold); font-weight: bold; cursor: pointer !important; 
                   border-radius: 10px; transition: 0.3s; text-align: left; }
        .nav-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        
        /* Iframe Viewer (Empire Window) */
        #display-window { width: 100%; height: 100%; border: none; background: white; border-radius: 0 0 0 20px; }
        
        /* Security Overlay */
        #lock { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .key-input { padding: 15px; font-size: 20px; border-radius: 5px; border: 2px solid var(--gold); background: #222; color: white; text-align: center; }
    </style>
</head>
<body>

<div id="lock">
    <h1 style="color: var(--gold);">SULTAN EMPIRE SECURITY</h1>
    <input type="password" id="sk" class="key-input" placeholder="ENTER MASTER KEY">
    <button onclick="unlock()" class="nav-btn" style="width:200px; margin-top:20px; text-align:center;">UNLOCK</button>
</div>

<div id="main-frame" style="display:none;">
    <div class="sidebar">
        <h2 style="color: var(--gold); border-bottom: 2px solid var(--gold);">SULTAN v5.0</h2>
        <button class="nav-btn" onclick="loadPage('quran')">📖 QURAN ENGINE</button>
        <button class="nav-btn" onclick="loadPage('daraz')">🛒 DARAZ GLOBAL</button>
        <button class="nav-btn" onclick="loadPage('games')">🎮 ELITE GAMES</button>
        <button class="nav-btn" onclick="startVoice()">🎙️ VOICE BRIDGE</button>
        <div style="margin-top:50px; font-size: 12px; color: var(--gold);">SYSTEM: ACTIVE<br>MODE: EMPIRE</div>
    </div>
    <div class="content-view">
        <div id="voice-status" style="position: absolute; top:10px; right:10px; color:red; font-weight:bold;"></div>
        <iframe id="display-window" src="about:blank"></iframe>
    </div>
</div>

<script>
    function unlock() {
        if(document.getElementById('sk').value === "SULTAN786") {
            document.getElementById('lock').style.display = 'none';
            document.getElementById('main-frame').style.display = 'flex';
        } else { alert("ACCESS DENIED"); }
    }

    function loadPage(type) {
        const win = document.getElementById('display-window');
        if(type === 'quran') win.src = 'https://www.quran.com'; // Cleanest Quran Interface
        if(type === 'daraz') win.src = 'https://www.daraz.pk'; // Official Daraz
        if(type === 'games') win.src = 'https://poki.com'; // Top Class Global Games
    }

    function startVoice() {
        const status = document.getElementById('voice-status');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ur-PK';
        status.innerHTML = "LISTENING TO SULTAN...";
        recognition.start();
        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            alert("Sultan said: " + text);
            status.innerHTML = "";
        };
        recognition.onerror = () => { status.innerHTML = "MIC ERROR"; };
    }
</script>
</body>
</html>
