<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN FUTURE-TECH V61.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #020202; --neon-green: #39ff14; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        .revenue-header { 
            background: #000; border-bottom: 3px solid var(--gold); 
            padding: 12px 25px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 5px 30px rgba(255, 215, 0, 0.4); z-index: 100; 
        }

        /* --- 1. THE ADVANCED 3D SOLID SPHERE (No Paper Thin Line) --- */
        .profile-section { display: flex; align-items: center; gap: 15px; }
        .sphere-box { width: 80px; height: 80px; perspective: 1200px; }
        .sphere-main {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; animation: rotate3D 8s linear infinite;
        }
        /* 3D گیند بنانے کے لیے ملٹی لیئرز */
        .sphere-layer {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px solid var(--gold);
            background: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png');
            background-size: 140%; /* چہرہ بڑا کر کے فٹ کیا */
            background-position: center 20%; /* صرف چہرے پر فوکس */
            box-shadow: inset 0 0 20px #000, 0 0 15px var(--gold);
            backface-visibility: visible;
        }
        .layer-1 { transform: rotateY(0deg) translateZ(2px); }
        .layer-2 { transform: rotateY(90deg) translateZ(2px); } /* یہ لکیر ختم کر دے گا */
        
        @keyframes rotate3D { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        .amount { color: var(--neon-green); font-size: 32px; font-weight: bold; text-shadow: 0 0 20px var(--neon-green); }

        /* --- 2. FULL COLOR GLASS BUTTONS --- */
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 25px; 
            display: grid; gap: 25px; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); 
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tile-btn { 
            position: relative; 
            background: var(--btn-bg); /* اب بٹن کا اپنا کلر ہے */
            backdrop-filter: blur(10px); 
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 22px; padding: 18px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 145px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        /* Under-glow Bulb */
        .tile-btn::after {
            content: ''; position: absolute; bottom: -15px; width: 100%; height: 50%;
            background: radial-gradient(circle, white 0%, transparent 70%);
            opacity: 0.3; filter: blur(12px);
        }

        .tile-btn:hover { 
            transform: translateY(-10px) scale(1.05); 
            border-color: #fff; box-shadow: 0 20px 40px var(--btn-glow); 
        }
        
        /* کلر سیٹنگز (بٹن کا کلر اب لائٹ جیسا ہے) */
        .glow-green { --btn-bg: rgba(37, 211, 102, 0.25); --btn-glow: rgba(37, 211, 102, 0.6); }
        .glow-blue { --btn-bg: rgba(24, 119, 242, 0.25); --btn-glow: rgba(24, 119, 242, 0.6); }
        .glow-red { --btn-bg: rgba(255, 0, 0, 0.25); --btn-glow: rgba(255, 0, 0, 0.6); }
        .glow-gold { --btn-bg: rgba(255, 215, 0, 0.25); --btn-glow: rgba(255, 215, 0, 0.6); }

        /* --- 3. QURAN OPEN ON REHAL (Latest Image) --- */
        .quran-btn {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://img.freepik.com/premium-photo/holy-quran-open-with-rehal_1029473-152230.jpg');
            background-size: cover; border: 4px solid #00ff88 !important;
            --btn-bg: rgba(0, 255, 136, 0.3); --btn-glow: rgba(0, 255, 136, 0.8);
        }

        .icon-circle { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        .tile-title { font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; text-shadow: 2px 2px 5px #000; }
    </style>
</head>

<script>
    const clickSfx = document.getElementById('click-sound');
    const hoverSfx = document.getElementById('hover-sound');
    function unlockAudio() { clickSfx.play().then(()=>clickSfx.pause()); hoverSfx.play().then(()=>hoverSfx.pause()); }
    function playClick() { clickSfx.currentTime = 0; clickSfx.play().catch(()=>{}); }
    function playHover() { hoverSfx.currentTime = 0; hoverSfx.play().catch(()=>{}); }

    let income = parseFloat(localStorage.getItem('sultan_income')) || 19.9840; 
    setInterval(() => { 
        income += 0.0004; 
        document.getElementById('revenue-val').innerText = "$" + income.toFixed(4); 
        localStorage.setItem('sultan_income', income); 
    }, 1000);
</script>
