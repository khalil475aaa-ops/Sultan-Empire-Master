<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN NEON HUB V56.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #050505; --neon-green: #39ff14; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        .revenue-header { 
            background: #000; border-bottom: 2px solid var(--gold); 
            padding: 10px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); z-index: 100; 
        }

        /* --- 1. SULTAN'S 3D EARTH SPHERE (Never Shrinks) --- */
        .sphere-wrapper { perspective: 1000px; width: 65px; height: 65px; }
        .sphere {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            animation: rotateEarth 10s linear infinite;
        }
        .sphere-side {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 3px solid var(--gold);
            background-image: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png');
            background-size: cover; background-position: center;
            box-shadow: 0 0 20px var(--gold); backface-visibility: visible;
        }
        .front { transform: translateZ(2px); }
        .back { transform: rotateY(180deg) translateZ(2px); }

        @keyframes rotateEarth {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .amount { color: var(--neon-green); font-size: 28px; font-weight: bold; text-shadow: 0 0 15px var(--neon-green); }

        /* --- 2. GLASS BUTTONS WITH INTERNAL & EDGE LIGHTING --- */
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 25px; 
            display: grid; gap: 30px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
        }

        .tile-btn { 
            position: relative; 
            background: rgba(255, 255, 255, 0.05); /* شیشے کا اثر */
            backdrop-filter: blur(15px); 
            border: 2px solid rgba(255, 255, 255, 0.3); /* رگڑا ہوا کنارہ */
            border-radius: 25px; /* روٹر پھیرا ہوا */
            padding: 20px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 140px; transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* بٹن کے اندر کا بلب (Internal Glow) */
        .tile-btn::before {
            content: ''; position: absolute; bottom: -20px; width: 60%; height: 40%;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
            opacity: 0.6; filter: blur(10px); transition: 0.3s;
        }

        .tile-btn:hover { border-color: var(--glow-color); transform: translateY(-5px); }
        .tile-btn:hover::before { opacity: 1; bottom: -10px; }

        /* رنگین لائٹنگ کی سیٹنگ */
        .glow-green { --glow-color: #25d366; }
        .glow-blue { --glow-color: #1877f2; }
        .glow-red { --glow-color: #ff0000; }
        .glow-gold { --glow-color: #ffd700; }

        /* --- 3. SPECIAL QURAN BUTTON (Surah Yaseen) --- */
        .quran-special {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://img.freepik.com/premium-photo/holy-quran-with-arabic-calligraphy-meaning-al-yasin_839035-17792.jpg');
            background-size: cover; background-position: center;
            border: 4px solid #00ff88 !important;
            --glow-color: #00ff88;
        }
        .quran-special i { font-size: 55px !important; text-shadow: 0 0 25px #00ff88; }

        .icon-circle { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; margin-bottom: 12px; }
        .tile-title { font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    </style>
</head>
<body onclick="initAudio()">

<audio id="click-sfx" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
<audio id="hover-sfx" src="https://www.soundjay.com/buttons/button-37.mp3" preload="auto"></audio>

<div class="revenue-header">
    <div class="profile-section">
        <div class="sphere-wrapper">
            <div class="sphere">
                <div class="sphere-side front"></div>
                <div class="sphere-side back"></div>
            </div>
        </div>
        <div style="font-weight:bold; color:var(--gold); font-size: 18px; margin-left: 10px;">SULTAN EMPIRE</div>
    </div>
    <div class="amount" id="income-meter">$19.9840</div>
</div>

<div class="dashboard-container">
    <a href="https://quran.com/ur" target="_blank" class="tile-btn quran-special" onmouseenter="playTune()" onmousedown="playTick()">
        <div class="icon-circle"><i class="fa-solid fa-book-quran" style="color:#00ff88;"></i></div>
        <span class="tile-title">Quran Pak</span>
    </a>

    <a href="https://www.google.com" target="_blank" class="tile-btn glow-blue" onmouseenter="playTune()" onmousedown="playTick()">
        <div class="icon-circle"><i class="fa-brands fa-google" style="color:#4285f4; font-size:35px;"></i></div>
        <span class="tile-title">Google</span>
    </a>

    <a href="https://web.whatsapp.com" target="_blank" class="tile-btn glow-green" onmouseenter="playTune()" onmousedown="playTick()">
        <div class="icon-circle"><i class="fa-brands fa-whatsapp" style="color:#25d366; font-size:40px;"></i></div>
        <span class="tile-title">WhatsApp</span>
    </a>

    <a href="https://www.youtube.com" target="_blank" class="tile-btn glow-red" onmouseenter="playTune()" onmousedown="playTick()">
        <div class="icon-circle"><i class="fa-brands fa-youtube" style="color:#ff0000; font-size:38px;"></i></div>
        <span class="tile-title">YouTube</span>
    </a>

    <a href="https://www.facebook.com" target="_blank" class="tile-btn glow-blue" onmouseenter="playTune()" onmousedown="playTick()">
        <div class="icon-circle"><i class="fa-brands fa-facebook" style="color:#1877f2; font-size:40px;"></i></div>
        <span class="tile-title">Facebook</span>
    </a>

    <a href="https://www.tiktok.com" target="_blank" class="tile-btn glow-gold" onmouseenter="playTune()" onmousedown="playTick()">
        <div class="icon-circle"><i class="fa-brands fa-tiktok" style="color:#fff; font-size:35px;"></i></div>
        <span class="tile-title">TikTok</span>
    </a>

    <a href="https://www.amazon.com" target="_blank" class="tile-btn glow-gold" onmouseenter="playTune()" onmousedown="playTick()">
        <div class="icon-circle"><i class="fa-brands fa-amazon" style="color:#ff9900; font-size:35px;"></i></div>
        <span class="tile-title">Amazon</span>
    </a>

    <a href="https://www.poki.com" target="_blank" class="tile-btn glow-red" onmouseenter="playTune()" onmousedown="playTick()">
        <div class="icon-circle"><i class="fa-solid fa-gamepad" style="color:#ff3e3e; font-size:35px;"></i></div>
        <span class="tile-title">Poki Games</span>
    </a>

    <a href="https://klingai.com" target="_blank" class="tile-btn glow-blue" onmouseenter="playTune()" onmousedown="playTick()">
        <div class="icon-circle"><i class="fa-solid fa-robot" style="color:#00f2ff; font-size:32px;"></i></div>
        <span class="tile-title">Kling AI</span>
    </a>

    <a href="https://www.bbc.com" target="_blank" class="tile-btn glow-red" onmouseenter="playTune()" onmousedown="playTick()">
        <div class="icon-circle"><i class="fa-solid fa-newspaper" style="color:#bb1919; font-size:32px;"></i></div>
        <span class="tile-title">BBC News</span>
    </a>
</div>

<script>
    const clickSfx = document.getElementById('click-sfx');
    const hoverSfx = document.getElementById('hover-sfx');

    function initAudio() {
        // یوزر کے پہلے کلک پر آڈیو انجن ایکٹو ہو جائے گا
        clickSfx.play().then(() => clickSfx.pause());
        hoverSfx.play().then(() => hoverSfx.pause());
    }

    function playTick() { clickSfx.currentTime = 0; clickSfx.play().catch(e => {}); }
    function playTune() { hoverSfx.currentTime = 0; hoverSfx.play().catch(e => {}); }

    // 5. REVENUE TRACKER
    let income = parseFloat(localStorage.getItem('sultan_income')) || 19.9840; 
    setInterval(() => { 
        income += 0.0004; 
        document.getElementById('income-meter').innerText = "$" + income.toFixed(4); 
        localStorage.setItem('sultan_income', income); 
    }, 1000);
</script>

<script src="https://pl28819672.effectivegatecpm.com/10/26/a8/1026a8fd412ba6e1ba7f87f0434b96e2.js"></script>
</body>
</html>
