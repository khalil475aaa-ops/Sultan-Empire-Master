<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN REAL-COLOR ICONIC V32.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .revenue-header { background: #000; border-bottom: 2px solid var(--gold); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); z-index: 100; }
        .amount { color: #39ff14; font-size: 28px; font-weight: bold; text-shadow: 0 0 10px #39ff14; }

        .dashboard-container { flex-grow: 1; overflow-y: auto; padding: 15px; display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }

        /* THE CRYSTAL BUTTON */
        .tile-btn { 
            position: relative;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px;
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 110px;
        }

        /* LOGO KA DAYRA (The Circle) */
        .icon-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid var(--gold); /* Chamakdar Gold Dayra */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        /* REAL COLORS FOR ICONS */
        .fa-whatsapp { color: #25D366; }
        .fa-facebook { color: #1877F2; }
        .fa-youtube { color: #FF0000; }
        .fa-amazon { color: #FF9900; }
        .fa-google { color: #4285F4; }
        .fa-tiktok { color: #FFFFFF; }
        .fa-book-quran { color: #00FF88; }
        .fa-robot { color: #FF00FF; }
        .fa-gamepad { color: #FF3E3E; }
        .fa-box { color: #FF6A00; } /* Alibaba */
        .fa-cart-shopping { color: #E62E04; } /* AliExpress */

        .tile-title { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Underglow Lighting */
        .btn-glow { box-shadow: 0 5px 15px rgba(255, 215, 0, 0.1); }
        .tile-btn:hover { transform: scale(1.05); border-color: var(--gold); }
    </style>
</head>
<body>

<div class="revenue-header">
    <div style="font-weight:bold; color:var(--gold);">SULTAN REAL-COLOR HUB</div>
    <div class="amount" id="main-income">$0.0000</div>
    <div style="font-size: 10px; color: #888;">GOLD CIRCLE V32.0</div>
</div>

<div class="dashboard-container">
    <a href="https://quran.com/ur" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#00ff88;"><i class="fa-solid fa-book-quran" style="font-size: 30px;"></i></div><span class="tile-title">Quran Pak</span></a>
    <a href="https://www.google.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#4285f4;"><i class="fa-brands fa-google" style="font-size: 30px;"></i></div><span class="tile-title">Google</span></a>
    <a href="https://web.whatsapp.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#25d366;"><i class="fa-brands fa-whatsapp" style="font-size: 32px;"></i></div><span class="tile-title">WhatsApp</span></a>
    <a href="https://www.facebook.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#1877f2;"><i class="fa-brands fa-facebook" style="font-size: 32px;"></i></div><span class="tile-title">Facebook</span></a>
    <a href="https://www.youtube.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#ff0000;"><i class="fa-brands fa-youtube" style="font-size: 30px;"></i></div><span class="tile-title">YouTube</span></a>
    <a href="https://www.tiktok.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#fff;"><i class="fa-brands fa-tiktok" style="font-size: 30px;"></i></div><span class="tile-title">TikTok</span></a>

    <a href="https://www.amazon.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#ff9900;"><i class="fa-brands fa-amazon" style="font-size: 28px;"></i></div><span class="tile-title">Amazon</span></a>
    <a href="https://www.alibaba.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#ff6a00;"><i class="fa-solid fa-box" style="font-size: 26px;"></i></div><span class="tile-title">Alibaba</span></a>
    <a href="https://www.aliexpress.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#e62e04;"><i class="fa-solid fa-cart-shopping" style="font-size: 26px;"></i></div><span class="tile-title">AliExpress</span></a>

    <a href="https://www.poki.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#ff3e3e;"><i class="fa-solid fa-gamepad" style="font-size: 28px;"></i></div><span class="tile-title">Poki Games</span></a>
    <a href="https://www.crazygames.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#ffd700;"><i class="fa-solid fa-headset" style="font-size: 28px;"></i></div><span class="tile-title">Crazy Games</span></a>
    <a href="https://www.epicgames.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#fff;"><i class="fa-solid fa-gun" style="font-size: 26px;"></i></div><span class="tile-title">Epic Games</span></a>
    <a href="https://www.y8.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#ff0000;"><i class="fa-solid fa-circle-play" style="font-size: 28px;"></i></div><span class="tile-title">Y8 Games</span></a>

    <a href="https://runwayml.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#ff00ff;"><i class="fa-solid fa-video" style="font-size: 26px;"></i></div><span class="tile-title">Runway AI</span></a>
    <a href="https://klingai.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#00f2ff;"><i class="fa-solid fa-robot" style="font-size: 26px;"></i></div><span class="tile-title">Kling AI</span></a>
    <a href="https://pika.art" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#fff;"><i class="fa-solid fa-wand-magic-sparkles" style="font-size: 26px;"></i></div><span class="tile-title">Pika AI</span></a>
    <a href="https://www.bbc.com" target="_blank" class="tile-btn"><div class="icon-circle" style="border-color:#bb1919;"><i class="fa-solid fa-newspaper" style="font-size: 26px;"></i></div><span class="tile-title">Global News</span></a>
</div>

<script>
    let income = parseFloat(localStorage.getItem('sultan_income')) || 0.8656; 
    function updateDisplay() {
        document.getElementById('main-income').innerText = "$" + income.toFixed(4);
        localStorage.setItem('sultan_income', income);
    }
    setInterval(() => { income += 0.0004; updateDisplay(); }, 1000);
    updateDisplay(); 
</script>
</body>
</html>
