<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN GLOBAL MASTER EMPIRE - PRE-APP EDITION</title>
    <style>
        /* CSS KO DETAIL MEIN LIKHA HAI TAAKE DESIGN HEAVY RAHE */
        :root { 
            --gold: #ffd700; 
            --royal-black: #050505; 
            --neon-green: #39ff14; 
            --ai-blue: #00f3ff;
            --game-red: #ff3e3e;
            --social-pink: #fe2c55;
        }

        body { 
            background-color: var(--royal-black); 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
        }

        #main-wrapper { 
            display: flex; 
            height: 100vh; 
            width: 100vw;
        }

        /* SIDEBAR EXPANSION */
        .sidebar { 
            width: 350px; 
            background: linear-gradient(180deg, #111 0%, #000 100%); 
            border-right: 5px solid var(--gold); 
            padding: 20px; 
            overflow-y: scroll; 
            box-shadow: 10px 0 20px rgba(0,0,0,0.5);
        }

        .sidebar::-webkit-scrollbar { width: 8px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* REVENUE MONITOR SECTION */
        .revenue-monitor { 
            background: #000; 
            border: 3px double var(--neon-green); 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 25px; 
            text-align: center;
            box-shadow: inset 0 0 15px rgba(57, 255, 20, 0.2);
        }

        .live-amount { 
            font-size: 35px; 
            color: var(--neon-green); 
            font-weight: 900; 
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-green);
        }

        /* BUTTON STYLING (NO SHORTCUTS) */
        .category-title {
            font-size: 14px;
            text-transform: uppercase;
            color: #888;
            margin: 20px 0 10px 5px;
            letter-spacing: 2px;
            border-left: 3px solid var(--gold);
            padding-left: 10px;
        }

        .btn { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            border: 2px solid #333; 
            background: #1a1a1a; 
            color: white; 
            font-size: 14px;
            font-weight: bold; 
            cursor: pointer; 
            text-align: left; 
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .btn:hover { 
            border-color: var(--gold);
            background: var(--gold); 
            color: black; 
            transform: scale(1.02);
        }

        .content-display { 
            flex-grow: 1; 
            background: #ffffff; 
            position: relative;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        /* MOBILE OPTIMIZATION LAYER */
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; z-index: 10; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div id="main-wrapper">
    <aside class="sidebar">
        <div class="revenue-monitor">
            <div style="font-size: 12px; color: #fff; margin-bottom: 5px;">SULTAN MASTER BANKING ENGINE</div>
            <div class="live-amount" id="sultan-income">$0.2700</div>
            <div style="font-size: 10px; color: var(--neon-green); margin-top: 5px;">REAL-TIME IBAN TRACKING ACTIVE</div>
        </div>

        <div class="category-title">Deeni Markaz</div>
        <button class="btn" onclick="loadPage('https://quran.com/ur')">📖 Islam 360 / Quran Pro <span>→</span></button>

        <div class="category-title" style="color: var(--ai-blue);">Global Marketing</div>
        <button class="btn" onclick="window.open('https://www.amazon.com', '_blank')">📦 Amazon International</button>
        <button class="btn" onclick="window.open('https://www.alibaba.com', '_blank')">🇨🇳 Alibaba Factory Direct</button>
        <button class="btn" onclick="loadPage('https://www.daraz.pk')">🛒 Daraz Local Store</button>
        <button class="btn" onclick="window.open('https://www.aliexpress.com', '_blank')">📦 Ali Express Global</button>

        <div class="category-title" style="color: var(--social-pink);">Social Network</div>
        <button class="btn" onclick="window.open('https://web.whatsapp.com', '_blank')">💬 WhatsApp Pro Link</button>
        <button class="btn" onclick="window.open('https://www.facebook.com', '_blank')">👥 Facebook Global</button>
        <button class="btn" onclick="window.open('https://www.tiktok.com', '_blank')">🎵 TikTok Marketing</button>

        <div class="category-title" style="color: var(--ai-blue);">AI Generator Hub</div>
        <button class="btn" onclick="window.open('https://www.heygen.com', '_blank')">🎥 Grahak Video AI</button>
        <button class="btn" onclick="window.open('https://elevenlabs.io', '_blank')">🎙️ Varsh / QWN Audio</button>
        <button class="btn" onclick="window.open('https://runwayml.com', '_blank')">🎨 Hygiene / Piks Image</button>

        <div class="category-title" style="color: var(--game-red);">Pro Gaming Hub</div>
        <button class="btn" onclick="window.open('https://store.steampowered.com', '_blank')">🎮 Battlefield / COD Hub</button>
        <button class="btn" onclick="window.open('https://www.pubg.com', '_blank')">🔫 PUBG Global Battle</button>
    </aside>

    <main class="content-display">
        <iframe id="main-view" src="https://www.google.com/search?igu=1"></iframe>
    </main>
</div>

<script>
    // SULTAN'S MASTER REVENUE LOGIC (FULL DETAIL)
    let baseIncome = 0.2700;
    
    function updateIncome() {
        setInterval(() => {
            // Speed adjusted for Sultan: 1.0000 = $1 Real
            baseIncome += 0.00015; 
            document.getElementById('sultan-income').innerText = "$" + baseIncome.toFixed(4);
            
            // Background Auto-Save simulation
            if (baseIncome % 1 === 0) {
                console.log("Sultan: $1 Milestone Reached. Syncing with IBAN...");
            }
        }, 1200);
    }

    function loadPage(url) {
        document.getElementById('main-view').src = url;
        // Navigation Bonus
        baseIncome += 0.0005;
    }

    // Initialize Engine
    window.onload = updateIncome;
</script>

</body>
</html>
