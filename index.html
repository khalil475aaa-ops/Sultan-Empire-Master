<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN FINAL HUB V67.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --deep-blue: #000b29; }
        
        /* --- BACKGROUND --- */
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #001a4d 0%, #000511 100%);
            color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }

        .revenue-header { 
            background: rgba(0,0,0,0.9); border-bottom: 3px solid var(--gold); 
            padding: 12px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 5px 25px rgba(0, 11, 41, 0.8); z-index: 100; 
        }

        /* --- 1. PERFECT ROUND 3D FACE ROTATION (No Square) --- */
        .glass-ball-frame {
            width: 85px; height: 85px; position: relative;
            border-radius: 50%; overflow: hidden; border: 2px solid var(--gold);
            box-shadow: 0 0 20px var(--gold); background: #000; /* کالے بیک گراؤنڈ کے ساتھ مکس */
            perspective: 1000px;
        }
        
        /* تصویر اب مکمل گول ہے اور چہرہ گھوم رہا ہے */
        .character-spin {
            position: absolute; width: 100%; height: 100%;
            background: url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png') center/cover;
            border-radius: 50%; /* تصویر کو گول کر دیا */
            z-index: 1;
            animation: gameRotate 6s linear infinite;
            transform-style: preserve-3d;
        }

        @keyframes gameRotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .glass-overlay {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%, rgba(255,255,255,0.3) 100%);
            z-index: 2; pointer-events: none;
        }

        .amount { color: #39ff14; font-size: 30px; font-weight: bold; text-shadow: 0 0 15px #39ff14; }

        /* --- 2. GRID & BUTTONS --- */
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 25px; 
            display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            background: rgba(0, 11, 41, 0.3); backdrop-filter: blur(5px);
        }

        .tile-btn { 
            position: relative; background: var(--crystal-clr); 
            backdrop-filter: blur(15px); 
            
            /* --- 3. HEAVY RAINBOW MOVING BORDER --- */
            border: 4px solid transparent; /* موٹی لکیر */
            border-radius: 25px; 
            
            padding: 20px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 140px; transition: 0.4s; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.1), 0 8px 15px rgba(0,0,0,0.4);
        }
        
        /* رنگ بدلتی ہوئی موٹی لکیر (شادی کی لائٹیں) */
        .tile-btn::before {
            content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 25px;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
            background-size: 400%;
            z-index: -1;
            animation: rainbowBorder 8s linear infinite;
            filter: blur(2px); /* تھوڑی سی چمک */
        }
        
        /* لکیر کے اندر والا حصہ (تاکہ بٹن کا کلر نظر آئے) */
        .tile-btn::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--crystal-clr);
            border-radius: 21px;
            z-index: -1;
        }

        @keyframes rainbowBorder {
            0% { background-position: 0%; }
            100% { background-position: 400%; }
        }

        .tile-btn:hover { transform: translateY(-8px) scale(1.05); }

        .clr-q { --crystal-clr: rgba(0, 143, 57, 0.5); }
        .clr-w { --crystal-clr: rgba(37, 211, 102, 0.5); }
        .clr-b { --crystal-clr: rgba(13, 71, 161, 0.5); }
        .clr-r { --crystal-clr: rgba(183, 28, 28, 0.5); }
        .clr-g { --crystal-clr: rgba(255, 143, 0, 0.5); }

        .icon-box { 
            width: 65px; height: 65px; background: #000; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 12px; border: 2px solid rgba(255,255,255,0.2); z-index: 5;
        }

        .quran-btn-bg {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://img.freepik.com/premium-photo/holy-quran-open-with-rehal_1029473-152230.jpg') !important;
            background-size: cover !important;
        }

        .tile-title { font-size: 11px; font-weight: bold; text-transform: uppercase; z-index: 5; text-shadow: 2px 2px 4px #000; }
    </style>
</head>

<script>
    const tuut = document.getElementById('tuut-sfx');
    const tick = document.getElementById('tick-sfx');
    
    // یوزر کے پہلے کلک پر آڈیو انجن کو آن کرنا (براؤزر کی سیکیورٹی کے لیے ضروری ہے)
    function activateAudioEngine() { tuut.play().then(()=>tuut.pause()); tick.play().then(()=>tick.pause()); }
    
    // ٹیوٹ ٹیوٹ آواز (Hover)
    function playTuut() { tuut.currentTime = 0; tuut.play().catch(()=>{}); }
    // ٹک ٹک آواز (Click)
    function playTick() { tick.currentTime = 0; tick.play().catch(()=>{}); }

    let income = parseFloat(localStorage.getItem('sultan_income')) || 19.9840; 
    setInterval(() => { 
        income += 0.0004; 
        document.getElementById('rev-count').innerText = "$" + income.toFixed(4); 
        localStorage.setItem('sultan_income', income); 
    }, 1000);
</script>
