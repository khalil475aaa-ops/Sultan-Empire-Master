<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN NEON HUB V60.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #050505; --neon-green: #39ff14; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        .revenue-header { 
            background: #000; border-bottom: 2px solid var(--gold); 
            padding: 10px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); z-index: 100; 
        }

        /* --- 1. PERFECT 3D SPHERE (Full Face Visible) --- */
        .profile-section { display: flex; align-items: center; gap: 15px; }
        .sphere-container { width: 75px; height: 75px; perspective: 1000px; }
        .sphere-ball {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; animation: rotateFull 10s linear infinite;
        }
        .sphere-ball::before, .sphere-ball::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            border-radius: 50%; 
            background: #111 url('https://i.postimg.cc/wBgcbZJk/Untitled-Project.png');
            background-size: contain; /* اب چہرہ پورا نظر آئے گا */
            background-repeat: no-repeat;
            background-position: center;
            border: 3px solid var(--gold); box-shadow: 0 0 20px var(--gold);
        }
        .sphere-ball::after { transform: rotateY(180deg); }
        @keyframes rotateFull { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        .amount { color: var(--neon-green); font-size: 28px; font-weight: bold; text-shadow: 0 0 15px var(--neon-green); }

        /* --- 2. GLASS BUTTONS WITH INTERNAL GLOW --- */
        .dashboard-container { 
            flex-grow: 1; overflow-y: auto; padding: 20px; 
            display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
        }

        .tile-btn { 
            position: relative; background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 15px; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 130px; transition: 0.3s; overflow: hidden;
        }

        /* Internal Bulb Glow */
        .tile-btn::after {
            content: ''; position: absolute; bottom: -10px; width: 80%; height: 40%;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
            opacity: 0.5; filter: blur(10px);
        }
        .tile-btn:hover { border-color: var(--glow-color); transform: scale(1.05); }
        
        .glow-green { --glow-color: #25d366; }
        .glow-blue { --glow-color: #1877f2; }
        .glow-red { --glow-color: #ff0000; }
        .glow-gold { --glow-color: #ffd700; }

        /* --- 3. SPECIAL OPEN QURAN ON REHAL --- */
        .quran-btn {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://img.freepik.com/premium-photo/holy-quran-open-with-rehal_1029473-152230.jpg');
            background-size: cover; border: 4px solid #00ff88 !important; --glow-color: #00ff88;
        }

        .icon-circle { width: 55px; height: 55px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; }
        .tile-title { font-size: 11px; font-weight: bold; text-transform: uppercase; text-shadow: 0 2px 4px #000; }
    </style>
</head>

<script>
    const kp = document.getElementById('keypad-sound');
    const tt = document.getElementById('tuut-sound');
    function startAudio() { kp.play().then(()=>kp.pause()); tt.play().then(()=>tt.pause()); }
    function playTuut() { tt.currentTime = 0; tt.play().catch(()=>{}); }
    function playKeypad() { kp.currentTime = 0; kp.play().catch(()=>{}); }

    let income = parseFloat(localStorage.getItem('sultan_income')) || 19.9840; 
    setInterval(() => { 
        income += 0.0004; 
        document.getElementById('income-box').innerText = "$" + income.toFixed(4); 
        localStorage.setItem('sultan_income', income); 
    }, 1000);
</script>
